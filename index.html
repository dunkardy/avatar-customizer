<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Customizer - ตัวปรับแต่งอวตาร์</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f14;--surface:#1a1a24;--surface2:#222230;--border:#2a2a3a;
  --text:#e0e0e8;--text2:#a0a0b0;--accent:#7c6ff0;--accent2:#5b4fd9;
  --pink:#e04090;--green:#40b080;--orange:#e0a040;--red:#e05050;
  --radius:10px;--gap:12px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
img{max-width:100%;height:auto;display:block}
button{cursor:pointer;font:inherit;border:none;border-radius:var(--radius);padding:10px 20px;transition:all .15s}
button:active{transform:scale(.97)}
h1,h2,h3{font-weight:600;line-height:1.3}
a{color:var(--accent)}

/* ===== Layout ===== */
#app{max-width:1400px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.5rem}
.header-actions{display:flex;gap:8px;align-items:center}
.lang-btn{background:var(--surface2);color:var(--text2);padding:6px 12px;font-size:.85rem}
.lang-btn.active{background:var(--accent);color:#fff}
.step-indicator{display:flex;gap:4px;align-items:center;font-size:.85rem;color:var(--text2)}
.step-indicator .active{color:var(--accent);font-weight:600}
.step-indicator span{margin:0 4px}

/* ===== Cards / Grid ===== */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--gap)}
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:2px solid transparent;transition:all .2s;cursor:pointer}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card.selected{border-color:var(--accent);box-shadow:0 0 20px rgba(124,111,240,.3)}
.card-img{aspect-ratio:3/4;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-img .placeholder{color:var(--text2);font-size:.75rem;text-align:center;padding:8px;word-break:break-word}
.card-name{padding:8px 10px;font-size:.82rem;font-weight:500;line-height:1.3}
.card-badge{font-size:.7rem;padding:2px 8px;border-radius:20px;display:inline-block;margin:4px 10px 8px}
.badge-rec{background:var(--accent);color:#fff}
.badge-new{background:var(--green);color:#fff}
.badge-warn{background:var(--orange);color:#000}
.badge-unknown{background:var(--red);color:#fff}
.booth-link{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;text-decoration:none;line-height:1;opacity:.7;transition:opacity .15s}
.booth-link:hover{opacity:1}
.card{position:relative}

/* ===== Buttons ===== */
.btn-primary{background:var(--accent);color:#fff;font-weight:600;padding:12px 28px;font-size:1rem}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-large{padding:16px 32px;font-size:1.1rem}

/* ===== Pages ===== */
.page{display:none}
.page.active{display:block}
.page-title{font-size:1.3rem;margin-bottom:16px}
.page-desc{color:var(--text2);margin-bottom:20px}

/* ===== Landing ===== */
.landing-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:24px}
.landing-card{background:var(--surface);border-radius:var(--radius);padding:28px;text-align:center;border:2px solid var(--border);cursor:pointer;transition:all .2s}
.landing-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.landing-card h2{font-size:1.2rem;margin-bottom:8px}
.landing-card p{color:var(--text2);font-size:.9rem}
.landing-icon{font-size:2.5rem;margin-bottom:12px}

/* ===== Search ===== */
.search-bar{margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font:inherit}
.search-bar select{padding:10px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font:inherit}

/* ===== Tag Filter ===== */
.tag-filter-area{margin-bottom:12px}
.tag-filter-area .tag-search{width:100%;max-width:300px;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font:inherit;font-size:.82rem;margin-bottom:8px}
.tag-chips{display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;padding:2px 0}
.tag-chip{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.78rem;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.tag-chip:hover{border-color:var(--accent);color:var(--text)}
.tag-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag-chip.zero{opacity:.4;border-style:dashed;cursor:default}
.tag-chip.zero:hover{border-color:var(--border);color:var(--text2)}
.tag-chip .tag-count{font-size:.7rem;opacity:.7;margin-left:3px}
.tag-clear-btn{background:none;color:var(--red);border:1px solid var(--red);border-radius:20px;padding:4px 12px;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .15s}
.tag-clear-btn:hover{background:var(--red);color:#fff}
.tag-no-match{color:var(--text2);font-size:.8rem;padding:4px 0}

/* ===== Tabs ===== */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto;flex-wrap:wrap}
.tab{padding:10px 18px;background:none;color:var(--text2);border-radius:var(--radius) var(--radius) 0 0;font-size:.9rem;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--accent);border-bottom:2px solid var(--accent)}
.tab .count{font-size:.75rem;background:var(--surface2);padding:1px 6px;border-radius:10px;margin-left:4px}

/* ===== Warnings ===== */
.warning{background:rgba(224,160,64,.1);border:1px solid var(--orange);border-radius:var(--radius);padding:12px 16px;margin:12px 0;font-size:.85rem}
.warning strong{color:var(--orange)}
.counter{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-weight:600;font-size:.9rem}
.counter.ok{background:rgba(64,176,128,.15);color:var(--green)}
.counter.warn{background:rgba(224,80,80,.15);color:var(--red)}

/* Selected items strip */
.selected-strip{display:flex;gap:6px;overflow-x:auto;padding:8px 0;margin-bottom:8px;flex-wrap:wrap}
.selected-item{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:4px 8px 4px 4px;white-space:nowrap;font-size:.8rem}
.selected-item img{width:32px;height:32px;object-fit:cover;border-radius:4px}
.selected-item .remove-btn{background:none;color:var(--red);padding:2px 6px;font-size:1rem;line-height:1;border-radius:50%}
.selected-item .remove-btn:hover{background:rgba(224,80,80,.2)}
#colorBar input[type=color]{-webkit-appearance:none;appearance:none;cursor:pointer}
#colorBar input[type=color]::-webkit-color-swatch-wrapper{padding:0}
#colorBar input[type=color]::-webkit-color-swatch{border-radius:4px;border:none}

/* ===== Summary ===== */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:16px 0}
.summary-card{background:var(--surface);border-radius:8px;overflow:hidden}
.summary-card .card-img{aspect-ratio:1}
.summary-card .card-name{font-size:.75rem;padding:6px 8px}
.summary-section{margin-bottom:20px}
.summary-section h3{font-size:1rem;margin-bottom:8px;color:var(--accent)}
.summary-text{background:var(--surface);border-radius:var(--radius);padding:16px;font-family:monospace;font-size:.9rem;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;line-height:1.7}
.copy-btn{margin-top:8px}

/* Hover preview */
.hover-preview{position:fixed;z-index:9999;pointer-events:none;border-radius:8px;border:2px solid var(--accent);box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:350px;max-height:80vh;background:var(--surface);display:none;overflow:hidden}
.hover-preview img{display:block;max-width:350px;max-height:400px;object-fit:contain;margin:0 auto}
.hover-tags{padding:6px 8px;display:flex;flex-wrap:wrap;gap:3px;background:var(--surface);border-top:1px solid var(--border)}
.hover-tag{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg);color:var(--text);white-space:nowrap}

/* ===== Toast ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:20px;font-weight:600;z-index:1000;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ===== Mobile ===== */
@media(max-width:640px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .landing-options{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .tabs{font-size:.8rem}
  .tab{padding:8px 12px}
}
</style>
</head>
<body>
<div id="app"></div>

<script src="data.js"></script>
<script>
// =========================================================================
// Avatar Customizer - Web App
// =========================================================================

// Image base path - points to Avatars root directory
// When served from Avatars root: python -m http.server -d Z:\Avatars
// Then access: http://localhost:8000/web-app/
const IMAGE_BASE = '';

// =========================================================================

// --- Translations ---
const T = {
  th: {
    appTitle: "Avatar Customizer - ตัวปรับแต่งอวตาร์",
    pickAvatar: "เลือกจากอวตาร์",
    pickAvatarDesc: "เลือกอวตาร์ตัวที่ชอบก่อน แล้วค่อยเลือกเสื้อผ้า, ทรงผม, และเครื่องประดับทีหลัง",
    pickOutfit: "เลือกจากชุด",
    pickOutfitDesc: "เห็นชุดที่ชอบแล้ว? เลือกชุดก่อน แล้วระบบจะแสดงอวตาร์ที่ใช้ชุดนั้นได้",
    recommended: "แนะนำ",
    female: "ผู้หญิง",
    male: "ผู้ชาย",
    unknown: "อื่นๆ",
    avatar: "อวตาร์",
    outfit: "ชุด",
    hair: "ทรงผม",
    textures: "Texture / เมคอัพ",
    accessories: "เครื่องประดับ",
    search: "ค้นหา...",
    filterGender: "เพศ",
    all: "ทั้งหมด",
    selectAvatar: "เลือกอวตาร์",
    selectOutfit: "เลือกชุด",
    compatibleAvatars: "อวตาร์ที่ใช้ได้",
    selectBase: "เลือกเป็นเบส",
    customize: "ปรับแต่ง",
    next: "ถัดไป",
    back: "ย้อนกลับ",
    summary: "สรุป",
    pieceCount: "จำนวนชิ้น",
    maxWarning: "VRChat จำกัด Physbone 256 transforms แนะนำให้เลือกผม+ชุดรวมกันไม่เกิน 8 ชิ้น หากเกินแนะนำให้สั่งแยกเป็น 2 ตัว",
    hairClipWarning: "เลือกกิ๊บ/เครื่องประดับติดผม แต่มีหลายทรงผม อาจปรับให้พอดีกับทุกทรงได้ยาก",
    unknownCompat: "ไม่ทราบว่าใช้กับอวตาร์ตัวไหน กรุณาสอบถามทางร้าน",
    hideUnknown: "ซ่อนชุดที่ไม่ทราบว่าใช้ได้กับอวตาร์ไหน",
    copyText: "คัดลอกข้อความ",
    copied: "คัดลอกแล้ว!",
    startOver: "เริ่มใหม่",
    noSelection: "ยังไม่ได้เลือก",
    verifyWithShop: "ตรวจสอบกับทางร้าน",
    discovered: "ใหม่",
    pathATitle: "เลือกอวตาร์เบส",
    pathBTitle: "เลือกชุดที่ชอบ",
    pathBCompat: "เลือกอวตาร์ที่ใช้ชุดนี้ได้",
    customizeTitle: "ปรับแต่งอวตาร์",
    summaryTitle: "สรุปคำสั่ง",
    tagFilter: "กรองด้วยแท็ก",
    tagSearchPlaceholder: "ค้นหาแท็ก...",
    clearTags: "ล้าง",
    noTagMatch: "ไม่มีแท็กที่ตรงกัน",
  },
  en: {
    appTitle: "Avatar Customizer",
    pickAvatar: "Pick Base Avatar",
    pickAvatarDesc: "Choose an avatar first, then customize with clothes, hair, and accessories",
    pickOutfit: "Pick Outfit First",
    pickOutfitDesc: "Found an outfit you love? Pick it first and see which avatars it works with",
    recommended: "Recommended",
    female: "Female",
    male: "Male",
    unknown: "Other",
    avatar: "Avatar",
    outfit: "Outfit",
    hair: "Hair",
    textures: "Textures/Makeup",
    accessories: "Accessories",
    props: "Props",
    search: "Search...",
    filterGender: "Gender",
    all: "All",
    selectAvatar: "Select Avatar",
    selectOutfit: "Select Outfit",
    compatibleAvatars: "Compatible Avatars",
    selectBase: "Select as Base",
    customize: "Customize",
    next: "Next",
    back: "Back",
    summary: "Summary",
    pieceCount: "Pieces",
    maxWarning: "VRChat limits to 256 Physbone transforms. Recommended: max 8 hair+cloth pieces combined. If exceeded, consider splitting into 2 avatars.",
    hairClipWarning: "Hair clips/accessories selected with multiple hairstyles. Fit may be inconsistent across different styles.",
    unknownCompat: "Compatibility unknown - please verify with shop",
    hideUnknown: "Hide unknown compatibility",
    copyText: "Copy Text",
    copied: "Copied!",
    startOver: "Start Over",
    noSelection: "Not selected",
    verifyWithShop: "Verify with shop",
    discovered: "New",
    pathATitle: "Pick Base Avatar",
    pathBTitle: "Pick Your Favorite Cloth",
    pathBCompat: "Pick Compatible Avatar",
    customizeTitle: "Customize Avatar",
    summaryTitle: "Order Summary",
    tagFilter: "Filter by Tags",
    tagSearchPlaceholder: "Search tags...",
    clearTags: "Clear",
    noTagMatch: "No matching tags",
  }
};

// --- State ---
let lang = localStorage.getItem('avatar-lang') || 'th';
let currentMain = null;  // set by each render function before DOM queries
let state = {
  page: 'landing',       // landing | pathA | pathB | pathBcompat | customize | summary
  selectedAvatar: null,  // avatar id
  selectedClothFirst: null, // cloth object (for path B)
  selections: {
    hairs: [],           // [{name, preview, sourceFile}]
    textures: [],        // [{name, preview, sourceFile}]
    clothes: [],         // [{name, preview, sourceFile}]
    accessories: [],     // [{name, preview, sourceFile}]
    props: [],           // [{name, preview, sourceFile}]
  },
  tagFilter: new Set(),   // Set of selected tag strings for AND filtering
  tagSearch: '',          // current tag search input
};

function t(key) { return (T[lang] || T.en)[key] || key; }

// --- Helpers ---
function avatarById(id) { return AVATAR_DATA.avatars[id]; }
function avatarList() {
  return Object.values(AVATAR_DATA.avatars).filter(a => a.id !== 'Sets' && a.name !== 'Sets');
}

function clothesForAvatar(avatarId) {
  const av = avatarById(avatarId);
  if (!av) return [];
  const allClothes = [...av.clothes];
  // Also include Sets clothes compatible with this avatar
  // Clothes with unknown compatibility (empty array) show on ALL avatars with a warning
  const sets = avatarById('Sets');
  if (sets) {
    for (const c of sets.clothes) {
      if (c.compatibleAvatars.length === 0 || c.compatibleAvatars.includes(avatarId)) {
        allClothes.push(c);
      }
    }
  }
  return allClothes;
}

function textureCount() {
  return state.selectedAvatar ? (avatarById(state.selectedAvatar)?.textures?.length || 0) : 0;
}

function pieceCount() {
  return state.selections.hairs.length + state.selections.clothes.length;
}

function isOverLimit() { return pieceCount() > 8; }

function hasHairClipConflict() {
  return state.selections.hairs.length > 1 &&
    state.selections.accessories.some(a =>
      a.name.toLowerCase().includes('clip') ||
      a.name.toLowerCase().includes('hairpin') ||
      a.name.toLowerCase().includes('กิ๊บ')
    );
}

// --- Render ---
function render() {
  hideHoverPreview();
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());

  const main = document.createElement('div');
  main.className = 'page active';

  switch (state.page) {
    case 'landing': renderLanding(main); break;
    case 'pathA': renderPathA(main); break;
    case 'pathB': renderPathB(main); break;
    case 'pathBcompat': renderPathBCompat(main); break;
    case 'customize': renderCustomize(main); break;
    case 'summary': renderSummary(main); break;
  }

  app.appendChild(main);
}

function renderHeader() {
  const h = document.createElement('div');
  h.className = 'header';

  const title = document.createElement('h1');
  title.textContent = t('appTitle');

  const actions = document.createElement('div');
  actions.className = 'header-actions';

  for (const l of ['th', 'en']) {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (lang === l ? ' active' : '');
    btn.textContent = l === 'th' ? 'TH' : 'EN';
    btn.onclick = () => { lang = l; localStorage.setItem('avatar-lang', l); render(); };
    actions.appendChild(btn);
  }

  // Step indicator
  if (state.page !== 'landing') {
    const steps = document.createElement('div');
    steps.className = 'step-indicator';
    const stepNames = {
      pathA: t('selectAvatar'), pathB: t('selectOutfit'),
      pathBcompat: t('selectAvatar'), customize: t('customize'),
      summary: t('summary')
    };
    const order = ['pathA','pathB','pathBcompat','customize','summary'];
    const cur = order.indexOf(state.page);
    for (let i = 0; i <= cur; i++) {
      if (i > 0) { const s = document.createElement('span'); s.textContent = '>'; steps.appendChild(s); }
      const s = document.createElement('span');
      s.textContent = stepNames[order[i]] || '';
      if (i === cur) s.className = 'active';
      steps.appendChild(s);
    }
    actions.appendChild(steps);
  }

  h.appendChild(title);
  h.appendChild(actions);
  return h;
}

// Hover preview
let hoverTimer = null;
let hoverPreview = null;

var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function showHoverPreview(item, evt) {
  if (isTouchDevice) return;
  if (!hoverPreview) {
    hoverPreview = document.createElement('div');
    hoverPreview.className = 'hover-preview';
    var img = document.createElement('img');
    hoverPreview.appendChild(img);
    var tagsDiv = document.createElement('div');
    tagsDiv.className = 'hover-tags';
    hoverPreview.appendChild(tagsDiv);
    document.body.appendChild(hoverPreview);
  }
  var img = hoverPreview.querySelector('img');
  img.src = IMAGE_BASE + item.preview;
  var tagsDiv = hoverPreview.querySelector('.hover-tags');
  var tags = item.autoTags || [];
  if (tags.length > 0) {
    tagsDiv.style.display = 'flex';
    tagsDiv.innerHTML = tags.map(function(t) {
      return '<span class="hover-tag">' + t.replace(/_/g, ' ') + '</span>';
    }).join('');
  } else {
    tagsDiv.style.display = 'none';
  }
  hoverPreview.style.display = 'block';
  updateHoverPosition(evt);
}

function updateHoverPosition(evt) {
  if (!hoverPreview || hoverPreview.style.display === 'none') return;
  var x = evt.clientX + 16, y = evt.clientY + 16;
  if (x + 350 > window.innerWidth) x = evt.clientX - 360;
  if (y + 500 > window.innerHeight) y = evt.clientY - 510;
  if (y < 0) y = 4;
  if (x < 0) x = 4;
  hoverPreview.style.left = x + 'px';
  hoverPreview.style.top = y + 'px';
}

function hideHoverPreview() {
  if (hoverPreview) hoverPreview.style.display = 'none';
  if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
}

// Dismiss hover preview on tap/click anywhere
document.addEventListener('click', function(e) {
  if (hoverPreview && hoverPreview.style.display !== 'none') {
    // Don't hide if clicking on a card (the page navigation will handle it via render())
    if (!e.target.closest('.card') && !e.target.closest('#avatarThumb') && !e.target.closest('.selected-item')) {
      hideHoverPreview();
    }
  }
});

function renderCard(item, onClick, badges = []) {
  const card = document.createElement('div');
  card.className = 'card';
  if (item._selected) card.classList.add('selected');

  // Hover preview on the image
  if (item.preview) {
    card.addEventListener('mouseenter', function(evt) {
      hoverTimer = setTimeout(function() { showHoverPreview(item, evt); }, 400);
    });
    card.addEventListener('mouseleave', hideHoverPreview);
  }

  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img';
  // Text placeholder (always visible behind image)
  const placeholder = document.createElement('span');
  placeholder.className = 'placeholder';
  placeholder.textContent = item.name;
  imgWrap.appendChild(placeholder);
  // Image (loads over placeholder if available)
  if (item.preview) {
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = IMAGE_BASE + item.preview;
    img.alt = item.name;
    img.onerror = function() { this.style.display = 'none'; };
    img.onload = function() { placeholder.style.display = 'none'; };
    imgWrap.appendChild(img);
  }
  card.appendChild(imgWrap);

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = item.name;
  name.title = item.name;
  card.appendChild(name);

  for (const b of badges) {
    const badge = document.createElement('span');
    badge.className = 'card-badge ' + (b.cls || '');
    badge.textContent = b.text;
    card.appendChild(badge);
  }

  // Booth.pm search link
  if (item.boothSearch) {
    const booth = document.createElement('a');
    booth.className = 'booth-link';
    booth.href = item.boothSearch;
    booth.target = '_blank';
    booth.rel = 'noopener';
    booth.title = lang === 'th' ? 'ค้นหาใน Booth.pm' : 'Search on Booth.pm';
    booth.textContent = 'B';
    booth.onclick = function(e) { e.stopPropagation(); };
    card.appendChild(booth);
  }

  if (onClick) card.onclick = () => onClick(item);
  return card;
}

      </select>

function renderPathAList() {
  const grid = (currentMain || document).querySelector('#avatarGrid');
  if (!grid) return;
  grid.innerHTML = '';

  let avatars = avatarList();

  // Filter
  if (pathAFilter.search) {
    const q = pathAFilter.search.toLowerCase();
    avatars = avatars.filter(a => a.name.toLowerCase().includes(q));
  }
  if (pathAFilter.gender === 'female') avatars = avatars.filter(a => a.gender === 'female');
  if (pathAFilter.gender === 'male') avatars = avatars.filter(a => a.gender === 'male');
  if (pathAFilter.gender === 'recommended') avatars = avatars.filter(a => a.recommended);

  // Pre-compute outfit counts for all avatars
  var setsClothes = (avatarById('Sets') || {}).clothes || [];
  var outfitCountMap = {};
  for (var ai = 0; ai < avatars.length; ai++) {
    var avId = avatars[ai].id;
    var count = (avatarById(avId) || {}).clothes ? avatarById(avId).clothes.length : 0;
    for (var si = 0; si < setsClothes.length; si++) {
      if ((setsClothes[si].compatibleAvatars || []).indexOf(avId) >= 0) count++;
    }
    outfitCountMap[avId] = count;
  }

  // Sort
  if (pathAFilter.sort === 'outfits') {
    avatars.sort(function(a,b) { return (outfitCountMap[b.id] || 0) - (outfitCountMap[a.id] || 0); });
  } else if (pathAFilter.sort === 'alpha') {
    avatars.sort((a,b) => a.name.localeCompare(b.name));
  } else {
    avatars.sort((a,b) => (b.dateAdded||0) - (a.dateAdded||0) || (b.recommended?1:0) - (a.recommended?1:0));
  }

  for (const av of avatars) {
    const badges = [];
    if (av.recommended) badges.push({text: t('recommended'), cls: 'badge-rec'});
    var oc = outfitCountMap[av.id] || 0;
    if (oc > 0) badges.push({text: oc + ' ' + t('outfit'), cls: 'badge-new'});
    if (av._discovered) badges.push({text: t('discovered'), cls: 'badge-new'});

    const card = renderCard(av, (item) => {
      state.selectedAvatar = item.id;
      state.selections = { hairs: [], textures: [], clothes: [], accessories: [], eyeColorLeft: '#000000', eyeColorRight: '#000000' };
      state.tagFilter = new Set();
      state.tagSearch = '';
      state.page = 'customize';
      render();
    }, badges);

    // Gender indicator
    if (av.gender === 'female' || av.gender === 'male') {
      const g = document.createElement('span');
      g.className = 'card-badge';
      g.style.cssText = 'background:var(--surface2);color:var(--text2)';
      g.textContent = av.gender === 'female' ? 'F' : 'M';
      card.appendChild(g);
    }

    grid.appendChild(card);
  }

  if (avatars.length === 0) {
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text2);padding:40px">${lang==='th'?'ไม่พบอวตาร์':'No avatars found'}</p>`;
  }
}

function renderPathBList() {
  const grid = (currentMain || document).querySelector('#clothGrid');
  if (!grid) return;
  var scrollY = window.scrollY;
  grid.innerHTML = '';

  renderTagFilter('pathB', renderPathBList);

  // Collect ALL clothes from Sets (cross-model)
  const sets = avatarById('Sets');
  if (!sets) { grid.innerHTML = '<p>No clothes found</p>'; return; }

  let clothes = [...sets.clothes];

  if (pathBFilter.search) {
    const q = pathBFilter.search.toLowerCase();
    clothes = clothes.filter(c => c.name.toLowerCase().includes(q));
  }

  // Tag filter (AND logic)
  if (state.tagFilter.size > 0) {
    var selectedTags = Array.from(state.tagFilter);
    clothes = clothes.filter(function(c) {
      var tags = c.autoTags || [];
      return selectedTags.every(function(t) { return tags.indexOf(t) >= 0; });
    });
  }

  // Sort
  if (pathBFilter.sort === 'alpha') {
    clothes.sort(function(a,b) { return a.name.localeCompare(b.name); });
  } else {
    clothes.sort(function(a,b) { return (b.dateAdded || 0) - (a.dateAdded || 0); });
  }

  for (const c of clothes) {
    const compat = c.compatibleAvatars.length;
    const badges = [];
    if (compat === 0) badges.push({text: t('unknownCompat'), cls: 'badge-unknown'});
    else badges.push({text: `${compat} ${t('avatar').toLowerCase()}`, cls: 'badge-rec'});

    const card = renderCard(c, (item) => {
      state.selectedClothFirst = item;
      state.page = 'pathBcompat';
      render();
    }, badges);

    grid.appendChild(card);
  }

  window.scrollTo(0, scrollY);
}

function escapeHTML(str) {
  const div = document.createElement('div');

function renderPathBCompat(main) {
  currentMain = main;
  try {
  const cloth = state.selectedClothFirst;
  if (!cloth) { main.innerHTML = '<p>No cloth selected. <button onclick="state.page=\'pathB\';render()">Back</button></p>'; return; }

  let compatAvatars = compatIds.map(function(id) { return avatarById(id); }).filter(Boolean);

  } else {
    parts.push(lang==='th' ? 'ใช้ได้กับ ' + compatAvatars.length + ' อวตาร์' : 'Compatible with ' + compatAvatars.length + ' avatars');
  }
  parts.push('</p>');
  if (isUnknown) {
    parts.push('<div class="warning"><strong>!</strong> ' + t('unknownCompat') + '</div>');
  }
  parts.push('<div class="card-grid" id="compatGrid"></div>');
  parts.push('<div style="margin-top:16px;display:flex;gap:8px">');
  parts.push('<button class="btn-secondary" onclick="state.page=\'pathB\';render()">' + t('back') + '</button>');
  parts.push('</div>');
  main.innerHTML = parts.join('');

  var grid = main.querySelector('#compatGrid');
  if (!grid) return;

  compatAvatars.sort(function(a,b) { return (b.recommended?1:0) - (a.recommended?1:0); });

  for (var i = 0; i < compatAvatars.length; i++) {
    var av = compatAvatars[i];

    var card = renderCard(av, (function(item) {
      state.selectedAvatar = item.id;
      state.selections = { hairs: [], textures: [], clothes: [], accessories: [], eyeColorLeft: '#000000', eyeColorRight: '#000000' };
      state.tagFilter = new Set();
      state.tagSearch = '';
      if (cloth) state.selections.clothes = [cloth];
      state.page = 'customize';
      render();
    }), badges);

    if (card) grid.appendChild(card);
  }
  } catch(e) {
    main.innerHTML = '<div style="padding:20px;color:red;background:#1a1a24"><h3>Error in renderPathBCompat:</h3><pre>' + e.message + '</pre><pre style="font-size:11px">' + (e.stack || 'no stack') + '</pre><p>cloth name: ' + (state.selectedClothFirst ? state.selectedClothFirst.name : 'null') + '</p><button onclick="state.page=\'pathB\';render()">Back</button></div>';
  }
}

      hchg.style.cssText = 'background:var(--surface2);color:var(--orange);border:1px dashed var(--orange);border-radius:4px;padding:3px 8px;font-size:.7rem;cursor:pointer';
      hchg.onclick = function() { state.selections.baseHairChanged = true; renderSelectedStrip(); };
      hairBase.appendChild(hchg);
    } else {
      for (var bci = 0; bci < bcolors.length; bci++) {
        var bcw = document.createElement('span');
        bcw.style.cssText = 'display:inline-flex;align-items:center;gap:2px';
        var bi = document.createElement('input');
        bi.type = 'color'; bi.value = bcolors[bci];
        bi.style.cssText = 'width:32px;height:32px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:1px';
        bi.onchange = (function(idx) { return function() { state.selections.baseHairColors[idx] = this.value; /* no re-render: keeps color picker open on mobile */ }; })(bci);
        bcw.appendChild(bi);
        if (bcolors.length > 1) {
          var bx = document.createElement('button');
          bx.textContent = 'x'; bx.style.cssText = 'background:none;color:var(--red);border:none;padding:0 2px;font-size:.8rem;cursor:pointer;line-height:1';
          bx.onclick = (function(idx) { return function() {
            state.selections.baseHairColors.splice(idx, 1);
            if (state.selections.baseHairColors.length === 0) state.selections.baseHairColors = ['#000000'];
            renderSelectedStrip();
          }; })(bci);
          bcw.appendChild(bx);
        }
        hairBase.appendChild(bcw);
      }
      var badd = document.createElement('button');
      badd.textContent = '+'; badd.title = lang==='th'?'เพิ่มสีสลับ':'Add toggle color';
      badd.style.cssText = 'background:var(--surface2);color:var(--accent);border:1px dashed var(--accent);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:1rem;line-height:1;padding:0;align-self:center';
      badd.onclick = function() { state.selections.baseHairColors.push('#000000'); renderSelectedStrip(); };
      hairBase.appendChild(badd);
      if (isExisting) {
        var hrev = document.createElement('button');
        hrev.textContent = isExisting ? (lang==='th'?'สีเดิม':'Revert') : (lang==='th'?'รูปปก':'Thumbnail');
        hrev.title = isExisting ? (lang==='th'?'กลับไปใช้สีเดิม':'Revert to existing color') : (lang==='th'?'กลับไปใช้สีตามรูปปก':'Revert to thumbnail color');
        hrev.style.cssText = 'background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.65rem;cursor:pointer';
        hrev.onclick = function() { state.selections.baseHairChanged = false; state.selections.baseHairColors = ['#000000']; renderSelectedStrip(); };
        hairBase.appendChild(hrev);
      }
      if (state.selections.hairs.length > 0) {
        var ball = document.createElement('button');
        ball.textContent = lang==='th'?'ใช้ทั้งหมด':'All'; ball.title = lang==='th'?'ใช้สีนี้กับทุกผม':'Apply to all hairs';
        ball.style.cssText = 'background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:.7rem;cursor:pointer;white-space:nowrap';
        ball.onclick = applyBaseHairColorToAll;
        hairBase.appendChild(ball);
      }
    }
    colorBar.appendChild(hairBase);
  }

  // Eye colors
  if (!state.selections.eyeColorLeft) state.selections.eyeColorLeft = '#000000';
  if (!state.selections.eyeColorRight) state.selections.eyeColorRight = '#000000';
  if (state.selections.eyeChanged === undefined) state.selections.eyeChanged = false;

  function renderOneEye(side, colorVal, otherColorVal) {
    var label = side === 'left' ? (lang==='th'?'สีตาซ้าย:':'Left Eye:') : (lang==='th'?'สีตาขวา:':'Right Eye:');
    var div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:4px';
    div.innerHTML = '<span style="font-weight:600;font-size:.9rem;color:var(--pink)">' + label + '</span>';
    if (!state.selections.eyeChanged) {
      div.innerHTML += '<span style="font-size:.8rem;color:var(--text2);background:var(--surface);border-radius:4px;padding:4px 10px">' + (isExisting ? (lang==='th'?'สีเดิม':'Existing') : (lang==='th'?'เหมือนรูปปก':'As thumbnail')) + '</span>';
      if (side === 'left') {
        var echg2 = document.createElement('button');
        var eyeCost;
        if (isExisting && state.selections.textures.length === 0) {
          eyeCost = lang==='th'?'เปลี่ยน (9 บาท)':'Change (9 baht)';
        } else if (isExisting && state.selections.textures.length > 0) {
          eyeCost = lang==='th'?'เปลี่ยน (ฟรี)':'Change (free)';
        } else {
          eyeCost = lang==='th'?'เปลี่ยน':'Change';
        }
        echg2.textContent = eyeCost;
        var eyeColor = (isExisting && state.selections.textures.length === 0) ? 'var(--orange)' : (isExisting ? 'var(--green)' : 'var(--orange)');
        echg2.style.cssText = 'background:var(--surface2);color:' + eyeColor + ';border:1px dashed ' + eyeColor + ';border-radius:4px;padding:3px 8px;font-size:.7rem;cursor:pointer';
        echg2.onclick = function() { state.selections.eyeChanged = true; renderSelectedStrip(); };
        div.appendChild(echg2);
      }
    } else {
      var inp = document.createElement('input');
      inp.type = 'color'; inp.value = colorVal;
      inp.style.cssText = 'width:32px;height:32px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:1px';
      inp.onchange = function() {
        if (side === 'left') state.selections.eyeColorLeft = this.value;
        else state.selections.eyeColorRight = this.value;
        // No re-render: keeps color picker open on mobile
      };
      div.appendChild(inp);
      var hexSpan = document.createElement('span');
      hexSpan.style.cssText = 'font-size:.8rem;font-family:monospace;color:var(--text2)';
      hexSpan.textContent = colorVal.toUpperCase();
      div.appendChild(hexSpan);
      var revertBtn = document.createElement('button');
      revertBtn.textContent = isExisting ? (lang==='th'?'สีเดิม':'Revert') : (lang==='th'?'รูปปก':'Thumbnail');
      revertBtn.title = lang==='th'?'กลับไปใช้สีเดิม':'Revert to existing color';
      revertBtn.style.cssText = 'background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.65rem;cursor:pointer';
      revertBtn.onclick = function() { state.selections.eyeChanged = false; renderSelectedStrip(); };
      div.appendChild(revertBtn);
      if (side === 'left') {
        var bothBtn = document.createElement('button');
        bothBtn.textContent = lang==='th'?'ทั้งสองข้าง':'Both';
        bothBtn.title = lang==='th'?'ใช้สีเดียวกันทั้งสองข้าง':'Apply to both eyes';
        bothBtn.style.cssText = 'background:var(--surface2);color:var(--pink);border:1px solid var(--pink);border-radius:4px;padding:2px 6px;font-size:.65rem;cursor:pointer';
        bothBtn.onclick = function() { state.selections.eyeColorRight = state.selections.eyeColorLeft; renderSelectedStrip(); };
        div.appendChild(bothBtn);
      }
    }
    return div;
  }

  colorBar.appendChild(renderOneEye('left', state.selections.eyeColorLeft, state.selections.eyeColorRight));
  colorBar.appendChild(renderOneEye('right', state.selections.eyeColorRight, state.selections.eyeColorLeft));

  // Toggle note
  var hasClothToggles = false;
  for (var cti = 0; cti < state.selections.clothes.length; cti++) {
    if ((state.selections.clothes[cti].toggles || []).length > 0) { hasClothToggles = true; break; }
  }
  if (hasClothToggles) {
    var togNote = document.createElement('div');
    togNote.style.cssText = 'font-size:.7rem;color:var(--text2);padding:4px 0';
    togNote.textContent = lang==='th' ? '* ของบนหัว (หมวก หูฟัง หูแมว ฯลฯ) ทำปุ่มเปิดปิดให้ฟรีอยู่แล้ว ไม่ต้องเพิ่มในช่องปุ่ม' : '* Head items (hats, headphones, cat ears, etc.) already get free toggles - no need to add them';
    colorBar.appendChild(togNote);
  }

  // Hair item colors
  var hairItems = state.selections.hairs;
  if (hairItems.length > 0) {
    var hairDiv = document.createElement('div');
    hairDiv.style.cssText = 'display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:8px 0;margin-bottom:8px';
    hairDiv.innerHTML = '<span style="font-weight:600;font-size:.9rem;color:var(--accent)">' + (lang==='th'?'สีผม:':'Hair Colors:') + '</span>';
    // Multi-color hint
    var hasMultiColor = false;
    for (var hi2 = 0; hi2 < hairItems.length; hi2++) {
      if ((hairItems[hi2].colors || []).length > 1) { hasMultiColor = true; break; }
    }
    if (hasMultiColor) {
      hairDiv.innerHTML += '<span style="font-size:.7rem;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:10px">&#8635; ' + (lang==='th'?'สีสลับ: เปลี่ยนสีตามลำดับเมื่อกด Toggle':'Color toggle') + '</span>';
    }
    colorBar.appendChild(hairDiv);
    for (var hi = 0; hi < hairItems.length; hi++) {
      var hitem = hairItems[hi];
      if (hitem.hairChanged === undefined) hitem.hairChanged = false;
      if (!hitem.colors) hitem.colors = hitem.color ? [hitem.color] : (isExisting ? [] : ['#000000']);
      var colors = hitem.colors;
      var wrapper = document.createElement('span');
      wrapper.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:var(--surface);border-radius:8px;padding:6px 12px;border:2px solid var(--accent);flex-wrap:wrap;margin-right:8px';
      var nameSpan = document.createElement('span');
      nameSpan.style.cssText = 'font-size:.8rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      nameSpan.textContent = hitem.name.length > 18 ? hitem.name.slice(0,16) + '..' : hitem.name;
      nameSpan.title = hitem.name;
      wrapper.appendChild(nameSpan);
      if (isExisting && !hitem.hairChanged && colors.length === 0) {
        var hstat = document.createElement('span');
        hstat.style.cssText = 'font-size:.7rem;color:var(--text2)';
        hstat.textContent = lang==='th'?'สีเดิม':'Existing';
        wrapper.appendChild(hstat);
        var hchg2 = document.createElement('button');
        hchg2.textContent = lang==='th'?'เปลี่ยน':'Change';
        hchg2.style.cssText = 'background:var(--surface2);color:var(--accent);border:1px dashed var(--accent);border-radius:4px;padding:2px 6px;font-size:.65rem;cursor:pointer';
        hchg2.onclick = (function(hIdx) { return function() {
          state.selections.hairs[hIdx].hairChanged = true;
          state.selections.hairs[hIdx].colors = ['#000000'];
          renderSelectedStrip();
        }; })(hi);
        wrapper.appendChild(hchg2);
      } else {
        for (var ci = 0; ci < colors.length; ci++) {
          var cw = document.createElement('span');
          cw.style.cssText = 'display:inline-flex;align-items:center;gap:2px';
          var inp = document.createElement('input');
          inp.type = 'color'; inp.value = colors[ci];
          inp.style.cssText = 'width:28px;height:28px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:1px';
          inp.onchange = (function(hIdx, cIdx) { return function() { setHairColor(hIdx, cIdx, this.value); }; })(hi, ci);
          cw.appendChild(inp);
          if (colors.length > 1) {
            var rmv = document.createElement('button');
            rmv.textContent = 'x';
            rmv.style.cssText = 'background:none;color:var(--red);border:none;padding:0 2px;font-size:.8rem;cursor:pointer;line-height:1';
            rmv.onclick = (function(hIdx, cIdx) { return function() { removeHairColor(hIdx, cIdx); }; })(hi, ci);
            cw.appendChild(rmv);
          }
          wrapper.appendChild(cw);
        }
        var addBtn = document.createElement('button');
        addBtn.textContent = '+'; addBtn.title = lang==='th'?'เพิ่มสีสลับ':'Add toggle color';
        addBtn.style.cssText = 'background:var(--surface2);color:var(--accent);border:1px dashed var(--accent);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:1rem;line-height:1;padding:0;align-self:center';
        addBtn.onclick = (function(hIdx) { return function() { addHairColor(hIdx); }; })(hi);
        wrapper.appendChild(addBtn);
        if (isExisting) {
          var hrev2 = document.createElement('button');
          hrev2.textContent = lang==='th'?'สีเดิม':'Revert';
          hrev2.style.cssText = 'background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.65rem;cursor:pointer';
          hrev2.onclick = (function(hIdx) { return function() {
            state.selections.hairs[hIdx].hairChanged = false;
            state.selections.hairs[hIdx].colors = [];
            renderSelectedStrip();
          }; })(hi);
          wrapper.appendChild(hrev2);
        }
      }
      if (hairItems.length >= 1) {
        var allBtn = document.createElement('button');
        allBtn.textContent = lang==='th'?'ใช้ทั้งหมด':'All'; allBtn.title = lang==='th'?'ใช้สีนี้กับทุกผม':'Apply to all hairs';
        allBtn.style.cssText = 'background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.65rem;cursor:pointer;white-space:nowrap';
        allBtn.onclick = (function(hIdx) { return function() { applyColorsToAll(hIdx); }; })(hi);
        wrapper.appendChild(allBtn);
      }
      hairDiv.appendChild(wrapper);
    }
  }

}

function updateOrderTypeButtons() {
  var newBtn = document.getElementById('btnNewAvatar');
  var addBtn = document.getElementById('btnAddExisting');
  if (!newBtn || !addBtn) return;
  var isNew = state.selections.isNewAvatar !== false;
  newBtn.style.background = isNew ? 'var(--accent)' : 'var(--surface2)';
  newBtn.style.color = isNew ? '#fff' : 'var(--text2)';
  newBtn.style.borderColor = isNew ? 'var(--accent)' : 'var(--border)';
  addBtn.style.background = !isNew ? 'var(--orange)' : 'var(--surface2)';
  addBtn.style.color = !isNew ? '#fff' : 'var(--text2)';
  addBtn.style.borderColor = !isNew ? 'var(--orange)' : 'var(--border)';
  renderColorBar();
  renderSelectedStrip();
}

function renderSelectedStrip() {
  const strip = (currentMain || document).querySelector('#selectedStrip');
  if (!strip) return;
  strip.innerHTML = '';

  const allItems = [
    ...state.selections.hairs.map(function(s) { s._cat = 'hairs'; return s; }),
    ...state.selections.textures.map(function(s) { s._cat = 'textures'; return s; }),
    ...state.selections.clothes.map(function(s) { s._cat = 'clothes'; return s; }),
    ...state.selections.accessories.map(function(s) { s._cat = 'accessories'; return s; }),
  ];

  // Update counters (always, even with no selections)
  var pc = pieceCount();
  var counterEl = (currentMain || document).querySelector('.counter');
  if (counterEl) {
    counterEl.textContent = t('pieceCount') + ': ' + pc + '/8';
    counterEl.className = 'counter ' + (pc > 8 ? 'warn' : 'ok');
  }
  var tabs = (currentMain || document).querySelectorAll('.tab .count');
  if (tabs.length >= 4) {
    tabs[0].textContent = state.selections.hairs.length;
    tabs[1].textContent = state.selections.textures.length;
    tabs[2].textContent = state.selections.clothes.length;
    tabs[3].textContent = state.selections.accessories.length;
  }
  var warnEl = (currentMain || document).querySelector('.warning');
  if (!warnEl && pc > 8) {
    warnEl = document.createElement('div');
    warnEl.className = 'warning';
    warnEl.innerHTML = '<strong>!</strong> ' + t('maxWarning');
    if (counterEl) counterEl.parentElement.appendChild(warnEl);
  } else if (warnEl && pc <= 8) {
    warnEl.parentElement.removeChild(warnEl);
  }

  if (allItems.length === 0) {
    strip.innerHTML = '<span style="color:var(--text2);font-size:.8rem;padding:4px">' + t('noSelection') + '</span>';
    renderColorBar();
    return;
  }

  for (var i = 0; i < allItems.length; i++) {
    var item = allItems[i];
    var div = document.createElement('div');
    div.className = 'selected-item';
    var img = document.createElement('img');
    img.src = item.preview ? IMAGE_BASE + item.preview : '';
    img.onerror = function() { this.style.display = 'none'; };
    if (item.preview) {
      (function(src) {
        div.addEventListener('mouseenter', function(e) { hoverTimer = setTimeout(function(){ showHoverPreview(src, e); }, 400); });
        div.addEventListener('mouseleave', hideHoverPreview);
      })(IMAGE_BASE + item.preview);
    }
    div.appendChild(img);
    var span = document.createElement('span');
    span.textContent = item.name.length > 30 ? item.name.slice(0,28) + '..' : item.name;
    div.appendChild(span);

    // Note button
    var noteBtn = document.createElement('button');
    var hasNote = !!item.note;
    noteBtn.textContent = hasNote ? (lang==='th'?'โน้ต✓':'Note✓') : (lang==='th'?'+โน้ต':'+Note');
    noteBtn.title = lang === 'th' ? 'เพิ่มโน้ต/คำขอพิเศษ' : 'Add note / special request';
    noteBtn.style.cssText = 'background:' + (hasNote ? 'var(--accent)' : 'transparent') + ';color:' + (hasNote ? '#fff' : 'var(--accent)') + ';border:1px dashed ' + (hasNote ? 'var(--accent)' : 'var(--border)') + ';border-radius:4px;padding:2px 8px;font-size:.7rem;cursor:pointer;white-space:nowrap';
    noteBtn.onclick = (function(cat, name) {
      return function(e) { e.stopPropagation(); showNoteDialog(cat, name); };
    })(item._cat, item.name);
    div.appendChild(noteBtn);

    // Toggle buttons for clothes
    if (item._cat === 'clothes') {
      var togs = item.toggles || [];
      for (var tgi = 0; tgi < togs.length; tgi++) {
        var tgSpan = document.createElement('span');
        tgSpan.style.cssText = 'font-size:.6rem;background:rgba(224,160,64,.15);color:var(--orange);border-radius:4px;padding:1px 4px;display:inline-flex;align-items:center;gap:2px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
        tgSpan.title = togs[tgi];
        tgSpan.textContent = togs[tgi];
        var tgX = document.createElement('button');
        tgX.textContent = 'x';
        tgX.style.cssText = 'background:none;color:var(--red);border:none;padding:0;font-size:.7rem;cursor:pointer;line-height:1';
        tgX.onclick = (function(cat, name, idx) {
          return function(e) { e.stopPropagation();
            var s = state.selections[cat].find(function(x){return x.name===name;});
            if (s && s.toggles) s.toggles.splice(idx, 1);
            renderCustomTabList(); renderSelectedStrip();
          };
        })(item._cat, item.name, tgi);
        tgSpan.appendChild(tgX);
        div.appendChild(tgSpan);
      }
      var togBtn = document.createElement('button');
      togBtn.textContent = '+';
      togBtn.title = lang==='th' ? 'เพิ่มปุ่มเปิดปิด' : 'Add toggle';
      togBtn.style.cssText = 'background:transparent;color:var(--orange);border:1px dashed var(--orange);border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:.7rem;line-height:1;padding:0';
      togBtn.onclick = (function(cat, name) {
        return function(e) { e.stopPropagation(); showToggleDialog(cat, name); };
      })(item._cat, item.name);
      div.appendChild(togBtn);
    }

    // Remove button
    var btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.textContent = 'x';
    btn.title = lang === 'th' ? 'ลบ' : 'Remove';
    btn.onclick = (function(cat, name) {
      return function() {
        var idx = state.selections[cat].findIndex(function(s) { return s.name === name; });
        if (idx >= 0) state.selections[cat].splice(idx, 1);
        renderCustomTabList();
        renderSelectedStrip();
      };
    })(item._cat, item.name);
    div.appendChild(btn);
    strip.appendChild(div);
  }

  renderColorBar();
}

function setHairColor(hairIdx, colorIdx, color) {
  if (!state.selections.hairs[hairIdx].colors) state.selections.hairs[hairIdx].colors = ['#000000'];
  state.selections.hairs[hairIdx].colors[colorIdx] = color;
  // Don't re-render: destroys the color input on mobile, dismissing picker
}

function addHairColor(hairIdx) {
  if (!state.selections.hairs[hairIdx].colors) state.selections.hairs[hairIdx].colors = ['#000000'];
  state.selections.hairs[hairIdx].colors.push('#000000');
  renderSelectedStrip();
}

function removeHairColor(hairIdx, colorIdx) {
  state.selections.hairs[hairIdx].colors.splice(colorIdx, 1);
  if (state.selections.hairs[hairIdx].colors.length === 0) {
    state.selections.hairs[hairIdx].colors = ['#000000'];
  }
  renderSelectedStrip();
}

function showToggleDialog(cat, name) {
  var sel = state.selections[cat];
  var item = sel.find(function(s) { return s.name === name; });
  if (!item) return;
  if (!item.toggles) item.toggles = [];
  var input = prompt(
    (lang==='th' ? 'ชื่อส่วนที่ต้องการปุ่มเปิดปิด (เพิ่มทีละอัน):\n(ของบนหัว เช่น หมวก หูฟัง ทำฟรีอยู่แล้ว ไม่ต้องเพิ่ม)\nที่มีอยู่แล้ว: ' : 'Toggle part name (add one at a time):\n(Head items are already free - no need to add)\nExisting: ') + (item.toggles.join(', ') || (lang==='th'?'ไม่มี':'none')),
    ''
  );
  if (input !== null && input.trim() !== '') {
    item.toggles.push(input.trim());
    renderCustomTabList();
    renderSelectedStrip();
  }
}

function showNoteDialog(cat, name) {
  var sel = state.selections[cat];
  var item = sel.find(function(s) { return s.name === name; });
  if (!item) return;
  var currentNote = item.note || '';
  var note = prompt(
    (lang==='th' ? 'โน้ต/คำขอพิเศษ สำหรับ' : 'Note / special request for') + ' ' + name + ':',
    currentNote
  );
  if (note !== null) {
    if (note.trim() === '') {
      delete item.note;
    } else {
      item.note = note.trim();
    }
    renderCustomTabList();
    renderSelectedStrip();
  }
}

function applyBaseHairColorToAll() {
  var colors = (state.selections.baseHairColors || ['#000000']).slice();
  for (var i = 0; i < state.selections.hairs.length; i++) {
    state.selections.hairs[i].colors = colors.slice();
  }
  renderSelectedStrip();
}

function applyColorsToAll(idx) {

// --- Tag Filter ---
function buildTagIndex(tab) {
  // Collect all items for this tab and count tag frequencies.
  // When tags are already selected, counts reflect the currently filtered set
  // (i.e. "how many items would match if I also add this tag?").
  // Tags that exist in the full set but have 0 in the filtered set are still
  // included so they appear during search.
  var items = [];
  switch (tab) {
    case 'hairs': items = AVATAR_DATA.hairs || []; break;
    case 'textures':
      if (state.selectedAvatar) {
        items = (avatarById(state.selectedAvatar)?.textures || []).slice();
        var setsTex = avatarById('Sets')?.textures || [];
        for (var ti = 0; ti < setsTex.length; ti++) {
          var st = setsTex[ti];
          var compat = st.compatibleAvatars || [];
          if (compat.length > 0 && compat.indexOf(state.selectedAvatar) >= 0) items.push(st);
        }
      }
      break;
    case 'clothes':
      if (state.selectedAvatar) items = clothesForAvatar(state.selectedAvatar);
      break;
    case 'accessories':
      items = (AVATAR_DATA.accessories || []).slice();
      if (state.selectedAvatar) {
        var avId2 = state.selectedAvatar;
        items = items.filter(function(acc) {
          var compat = acc.compatibleAvatars;
          if (!compat || compat.length === 0) return true;
          return compat.indexOf(avId2) >= 0;
        });
      }
      break;
    case 'pathB':
      var setsB = avatarById('Sets');
      if (setsB) items = setsB.clothes || [];
      break;
  }

  // Build full tag frequency from ALL items (unfiltered)
  var fullFreq = {};
  for (var i = 0; i < items.length; i++) {
    var tags = items[i].autoTags || [];
    for (var j = 0; j < tags.length; j++) {
      var t = tags[j];
      fullFreq[t] = (fullFreq[t] || 0) + 1;
    }
  }

  // Apply current tag filter to get refinement counts
  var tagArr = [];
  state.tagFilter.forEach(function(t) { tagArr.push(t); });
  var filtered = items;
  if (tagArr.length > 0) {
    filtered = items.filter(function(i) {
      var tags = i.autoTags || [];
      return tagArr.every(function(t) { return tags.indexOf(t) >= 0; });
    });
  }

  var freq = {};
  for (var i2 = 0; i2 < filtered.length; i2++) {
    var ftags = filtered[i2].autoTags || [];
    for (var j2 = 0; j2 < ftags.length; j2++) {
      var t2 = ftags[j2];
      freq[t2] = (freq[t2] || 0) + 1;
    }
  }

  // Build result: include all tags, even if count is 0 or 1.
  // Rare tags still show up during search.
  var result = [];
  var keys = Object.keys(fullFreq);
  for (var k = 0; k < keys.length; k++) {
    var tag = keys[k];
    var count = freq[tag] || 0;
    result.push({tag: tag, count: count, fullCount: fullFreq[tag]});
  }
  result.sort(function(a,b) { return b.count - a.count || b.fullCount - a.fullCount; });
  return result;
}

function renderTagFilter(optTab, refreshFn) {
  var area = (currentMain || document).querySelector('#tagFilterArea');
  if (!area) return;

  var tab = optTab || customTab;
  var refresh = refreshFn || renderCustomTabList;
  var tagData = buildTagIndex(tab);
  var selected = state.tagFilter;
  var search = (state.tagSearch || '').toLowerCase();

  // Store context on area so event handlers can read current values
  // (avoids stale closure captures when tabs are switched)
  area._tab = tab;
  area._refresh = refresh;

  // Search row — only rebuild if it doesn't exist yet
  var searchRow = area.querySelector('.tag-search-row');
  if (!searchRow) {
    area.innerHTML = '';
    searchRow = document.createElement('div');
    searchRow.className = 'tag-search-row';
    searchRow.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'tag-search';
    input.placeholder = t('tagSearchPlaceholder');
    input.oninput = function() {
      state.tagSearch = this.value;
      renderTagFilter(area._tab, area._refresh);
    };
    searchRow.appendChild(input);

    var clearBtn = document.createElement('button');
    clearBtn.className = 'tag-clear-btn';
    clearBtn.style.display = 'none';
    clearBtn.onclick = function() {
      state.tagFilter = new Set();
      state.tagSearch = '';
      area._refresh();
    };
    searchRow.appendChild(clearBtn);
    area.appendChild(searchRow);

    var chipsArea = document.createElement('div');
    chipsArea.className = 'tag-chips-area';
    area.appendChild(chipsArea);
  }

  // Update search input value
  var input = searchRow.querySelector('.tag-search');
  if (input) input.value = state.tagSearch || '';

  // Update clear button
  var clearBtn = searchRow.querySelector('.tag-clear-btn');
  if (clearBtn) {
    clearBtn.style.display = selected.size > 0 ? '' : 'none';
    if (selected.size > 0) clearBtn.textContent = t('clearTags') + ' (' + selected.size + ')';
  }

  // Rebuild chips only
  var chipsArea = area.querySelector('.tag-chips-area');
  if (!chipsArea) return;
  chipsArea.innerHTML = '';

  // Filter by search — when searching, show all tags including rare ones (count 1)
  // When not searching, only show tags with fullCount >= 2 to keep the default view tidy
  var filtered = tagData;
  if (search) {
    filtered = tagData.filter(function(td) { return td.tag.toLowerCase().indexOf(search) >= 0; });
  } else {
    filtered = tagData.filter(function(td) { return td.fullCount >= 2; });
  }

  var maxShow = search ? filtered.length : Math.min(filtered.length, 40);
  var display = filtered.slice(0, maxShow);

  // Always show selected tags even if they don't match the search
  if (selected.size > 0) {
    var displaySet = new Set();
    for (var d = 0; d < display.length; d++) { displaySet.add(display[d].tag); }
    selected.forEach(function(t) {
      if (!displaySet.has(t)) {
        // Look up the tag count from tagData
        for (var j = 0; j < tagData.length; j++) {
          if (tagData[j].tag === t) { display.unshift(tagData[j]); break; }
        }
      }
    });
  }

  if (display.length === 0) {
    var noMatch = document.createElement('div');
    noMatch.className = 'tag-no-match';
    noMatch.textContent = t('noTagMatch');
    chipsArea.appendChild(noMatch);
    return;
  }

  var chips = document.createElement('div');
  chips.className = 'tag-chips';

  // Put selected tags first
  var ordered = [];
  var rest = [];
  for (var d = 0; d < display.length; d++) {
    if (selected.has(display[d].tag)) ordered.push(display[d]);
    else rest.push(display[d]);
  }
  display = ordered.concat(rest);

  for (var i = 0; i < display.length; i++) {
    var td = display[i];
    var isZero = td.count === 0 && !selected.has(td.tag);
    var chip = document.createElement('span');
    chip.className = 'tag-chip' + (selected.has(td.tag) ? ' selected' : '') + (isZero ? ' zero' : '');
    chip.innerHTML = td.tag.replace(/_/g, ' ') + '<span class="tag-count">' + td.count + '</span>';
    if (!isZero) {
      chip.onclick = (function(tag) {
        return function() {
          if (state.tagFilter.has(tag)) {
            state.tagFilter.delete(tag);
          } else {
            state.tagFilter.add(tag);
          }
          refresh();
        };
      })(td.tag);
    }
    chips.appendChild(chip);
  }
  chipsArea.appendChild(chips);
}

function renderCustomTabList() {
  const grid = (currentMain || document).querySelector('#customGrid');
  if (!grid) return;
  var scrollY = window.scrollY;
  grid.innerHTML = '';

  renderTagFilter();

  const searchEl = (currentMain || document).querySelector('#customSearch');
  const query = searchEl ? searchEl.value.toLowerCase() : '';

  let items = [];
  const sel = state.selections;

  switch (customTab) {
    case 'hairs':
      items = [...AVATAR_DATA.hairs];
      break;
    case 'textures':
      if (state.selectedAvatar) {
        items = (avatarById(state.selectedAvatar)?.textures || []).slice();
        // Include Sets textures compatible with selected avatar (or unknown compat)
        const setsTex = avatarById('Sets')?.textures || [];
        const avId = state.selectedAvatar;
        for (var ti = 0; ti < setsTex.length; ti++) {
          var st = setsTex[ti];
          var compat = st.compatibleAvatars || [];
          if (compat.length > 0 && compat.indexOf(avId) >= 0) {
            items.push(st);
          }
        }
      }
      break;
    case 'clothes':
      if (state.selectedAvatar) {
        items = clothesForAvatar(state.selectedAvatar);
      }
      break;
    case 'accessories':
      items = AVATAR_DATA.accessories.slice();
      // Filter: only show universal (no compat) or compatible with selected avatar
      if (state.selectedAvatar) {
        var avId2 = state.selectedAvatar;
        items = items.filter(function(acc) {
          var compat = acc.compatibleAvatars;
          if (!compat || compat.length === 0) return true; // universal
          return compat.indexOf(avId2) >= 0;
        });
      }
      break;
  }

  // Mark selected
  const selSet = new Set(sel[customTab].map(s => s.name));
  for (const item of items) {
    item._selected = selSet.has(item.name);
  }

  // Filter
  if (query) {
    items = items.filter(i => i.name.toLowerCase().includes(query));
  }

  // Hide unknown compatibility items when checkbox is checked
  if (hideUnknownCompat) {
    items = items.filter(function(i) {
      var compat = i.compatibleAvatars;
      // Items without compat field (hairs, avatar textures) always pass
      // Items with empty compat (unknown) are hidden
      return compat === undefined || compat.length > 0;
    });
  }

  // Tag filter (AND logic: item must have ALL selected tags)
  if (state.tagFilter.size > 0) {
    var selectedTags = Array.from(state.tagFilter);
    items = items.filter(function(i) {
      var tags = i.autoTags || [];
      return selectedTags.every(function(t) { return tags.indexOf(t) >= 0; });
    });
  }

  // Sort
  if (customSort === 'alpha') {
    items.sort(function(a,b) { return a.name.localeCompare(b.name); });
  } else {
    items.sort(function(a,b) { return (b.dateAdded || 0) - (a.dateAdded || 0); });
  }

  // Unknown compat badge
  for (const item of items) {
    const badges = [];
    if (customTab === 'clothes' && item.compatibleAvatars && item.compatibleAvatars.length === 0) {
      badges.push({text: t('unknownCompat'), cls: 'badge-unknown'});
    }

    const card = renderCard(item, (clicked) => {
      toggleSelection(customTab, clicked);
      renderCustomTabList();
    }, badges);

    grid.appendChild(card);
  }

  if (items.length === 0) {
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text2);padding:40px">${lang==='th'?'ไม่มีรายการ':'No items'}</p>`;
  }

  renderSelectedStrip();
  renderColorBar();

  window.scrollTo(0, scrollY);
}

function colorName(hex) {
  var names = {
    '#000000': lang==='th'?'ดำ':'Black', '#ffffff': lang==='th'?'ขาว':'White',
    '#ff0000': lang==='th'?'แดง':'Red', '#ffcccc': lang==='th'?'ชมพูอ่อน':'Light Pink',
    '#ff69b4': lang==='th'?'ชมพู':'Pink', '#ff1493': lang==='th'?'ชมพูเข้ม':'Deep Pink',
    '#ff8800': lang==='th'?'ส้ม':'Orange', '#ffff00': lang==='th'?'เหลือง':'Yellow',
    '#00ff00': lang==='th'?'เขียว':'Green', '#0000ff': lang==='th'?'น้ำเงิน':'Blue',
    '#00ffff': lang==='th'?'ฟ้า':'Cyan', '#800080': lang==='th'?'ม่วง':'Purple',
    '#8b4513': lang==='th'?'น้ำตาล':'Brown', '#808080': lang==='th'?'เทา':'Gray',
    '#cccccc': lang==='th'?'เทาอ่อน':'Light Gray', '#ffd700': lang==='th'?'ทอง':'Gold',
    '#c0c0c0': lang==='th'?'เงิน':'Silver', '#ffb6c1': lang==='th'?'ชมพูอ่อน':'Light Pink',
    '#90ee90': lang==='th'?'เขียวอ่อน':'Light Green', '#87ceeb': lang==='th'?'ฟ้าอ่อน':'Light Blue',
    '#f5f5dc': lang==='th'?'เบจ':'Beige', '#ffe4c4': lang==='th'?'ไบออเรจ':'Bisque',
    '#d2b48c': lang==='th'?'แทน':'Tan', '#a52a2a': lang==='th'?'น้ำตาลแดง':'Brown',
    '#800000': lang==='th'?'แดงเข้ม':'Maroon', '#008000': lang==='th'?'เขียวเข้ม':'Dark Green',
    '#000080': lang==='th'?'กรมท่า':'Navy', '#4b0082': lang==='th'?'คราม':'Indigo',
  };
  hex = hex.toLowerCase();
  if (names[hex]) return names[hex];
  // Try closest match
  var closest = null, minDist = Infinity;
  for (var h in names) {
    var d = Math.abs(parseInt(h.slice(1,3),16) - parseInt(hex.slice(1,3),16)) +
            Math.abs(parseInt(h.slice(3,5),16) - parseInt(hex.slice(3,5),16)) +
            Math.abs(parseInt(h.slice(5,7),16) - parseInt(hex.slice(5,7),16));
    if (d < minDist) { minDist = d; closest = names[h]; }
  }
  return closest || hex;
}

function toggleSelection(tab, item) {
  const sel = state.selections[tab];
  const idx = sel.findIndex(s => s.name === item.name);
  if (idx >= 0) {
    sel.splice(idx, 1);
    item._selected = false;
  } else {
    var entry = { name: item.name, preview: item.preview, sourceFile: item.sourceFile };
    if (tab === 'hairs') {
      if (state.selections.isNewAvatar === false) {
        entry.colors = []; // empty = existing color
        entry.hairChanged = false;
      } else {
        entry.colors = ['#000000'];
      }
    }
    sel.push(entry);
    item._selected = true;
  }
}

function calculatePrice() {
  var total = 0;
  var details = [];
  var isNew = state.selections.isNewAvatar !== false;

  // Base avatar: 99 (only for new avatars)
  if (isNew) {
    total += 99;
    details.push((lang==='th'?'ตัวเบส':'Base avatar') + ': 99');
  } else {
    details.push((lang==='th'?'เพิ่มของใส่ตัวเดิม (ไม่มีค่าตัวเบส)':'Add to existing avatar (no base cost)') + ': 0');
  }
  // Hair: 49 each
  if (state.selections.hairs.length > 0) {
    var hc = state.selections.hairs.length * 49;
    total += hc;
    details.push((lang==='th'?'ทรงผม':'Hair') + ' x' + state.selections.hairs.length + ': ' + hc);
  }
  // Hair color: free for new avatar, 9 baht each for existing (base + additional hairs)
  // Hair color toggles: 9 baht per extra color per hair
  var hairToggleCount = 0;
  if (isNew) {
    // New avatar: only count extra colors beyond first
    if (state.selections.baseHairColors && state.selections.baseHairColors.length > 1) {
      hairToggleCount += state.selections.baseHairColors.length - 1;
    }
    for (var hi = 0; hi < state.selections.hairs.length; hi++) {
      var hcolors = state.selections.hairs[hi].colors || [];
      if (hcolors.length > 1) hairToggleCount += hcolors.length - 1;
    }
  } else {
    // Existing avatar: first color change costs 9, extras cost 9 each
    if (state.selections.baseHairChanged) {
      hairToggleCount += 1;
      if (state.selections.baseHairColors && state.selections.baseHairColors.length > 1) {
        hairToggleCount += state.selections.baseHairColors.length - 1;
      }
    }
    for (var hi = 0; hi < state.selections.hairs.length; hi++) {
      var hcolors2 = state.selections.hairs[hi].colors || [];
      if (hcolors2.length > 0) {
        hairToggleCount += 1; // changing from existing
        if (hcolors2.length > 1) hairToggleCount += hcolors2.length - 1;
      }
    }
  }
  if (hairToggleCount > 0) {
    var htc = hairToggleCount * 9;
    total += htc;
    details.push((lang==='th'?'ค่าปรับสีผม':'Hair color change') + ' x' + hairToggleCount + ': ' + htc);
  }
  // Eye color: free for new avatar, 9 baht for existing (unless they added textures)
  var eyeChanged = state.selections.eyeChanged === true;
  if (!isNew && eyeChanged && state.selections.textures.length === 0) {
    total += 9;
    details.push((lang==='th'?'ค่าปรับสีตา':'Eye color change') + ': 9');
  } else if (!isNew && eyeChanged && state.selections.textures.length > 0) {
    details.push((lang==='th'?'ปรับสีตา (ฟรี เพราะเพิ่ม Texture)':'Eye color change (free with texture)') + ': 0');
  }
  // Textures: 39 each
  if (state.selections.textures.length > 0) {
    var tc = state.selections.textures.length * 39;
    total += tc;
    details.push((lang==='th'?'Texture':'Texture') + ' x' + state.selections.textures.length + ': ' + tc);
  }
  // Clothes: 49 each
  if (state.selections.clothes.length > 0) {
    var cc = state.selections.clothes.length * 49;
    total += cc;
    details.push((lang==='th'?'ชุด':'Outfit') + ' x' + state.selections.clothes.length + ': ' + cc);
  }
  // Cloth toggles: 9 each, free for head items
  var headKeywords = ['หมวก','hat','cap','hood','หูฟัง','headphone','earphone','หูแมว','หูกระต่าย','cat ear','bunny ear','rabbit ear','animal ear','helmet','crown','มงกุฎ','headband','ribbon','โบว์','bow','glasses','แว่น','mask','หน้ากาก','veil','hoodie','หู','ears','head','หัว','bean','beanie','beret','visor','tiara','hairpin','hairclip','กิ๊บ','clip'];
  var paidToggles = 0;
  var freeToggles = 0;
  for (var ci = 0; ci < state.selections.clothes.length; ci++) {
    var ctogs = state.selections.clothes[ci].toggles || [];
    for (var ti = 0; ti < ctogs.length; ti++) {
      var tname = ctogs[ti].toLowerCase();
      var isHead = false;
      for (var hk = 0; hk < headKeywords.length; hk++) {
        if (tname.indexOf(headKeywords[hk]) >= 0) { isHead = true; break; }
      }
      if (isHead) freeToggles++; else paidToggles++;
    }
  }
  if (paidToggles > 0) {
    total += paidToggles * 9;
    details.push((lang==='th'?'ปุ่มเปิดปิดชุด':'Outfit toggles') + ' x' + paidToggles + ': ' + (paidToggles * 9));
  }
  if (freeToggles > 0) {
    details.push((lang==='th'?'ปุ่มเปิดปิดของบนหัว (ฟรี)':'Head item toggles (free)') + ' x' + freeToggles + ': 0');
  }
  // Accessories: 39 each (free toggles)
  if (state.selections.accessories.length > 0) {
    var ac = state.selections.accessories.length * 39;
    total += ac;
    details.push((lang==='th'?'เครื่องประดับ':'Accessories') + ' x' + state.selections.accessories.length + ': ' + ac);
  }
  // Optional services
  if (state.selections.optPolygon) {
    total += 49;
    details.push((lang==='th'?'ลด Polygon':'Polygon reduction') + ': 49');
  }
  if (state.selections.optPCSS) {
    total += 69;
    details.push((lang==='th'?'PCSS เงาสมจริง':'PCSS shadows') + ': 69');
  }
  var dpsHole = state.selections.optDPSHole || 0;
  var dpsRod = state.selections.optDPSRod || 0;
  if (dpsHole > 0) {
    total += dpsHole * 19;
    details.push((lang==='th'?'DPS รู':'DPS holes') + ' x' + dpsHole + ': ' + (dpsHole * 19));
  }
  if (dpsRod > 0) {
    total += dpsRod * 29;
    details.push((lang==='th'?'DPS แท่ง':'DPS rods') + ' x' + dpsRod + ': ' + (dpsRod * 29));
  }
  return { total: total, details: details };
}

function generateSummaryText() {
  const lines = [];
  const av = avatarById(state.selectedAvatar);

  if (state.selections.isNewAvatar === false) {
    lines.push(lang === 'th' ? '=== เพิ่มของใส่ตัวเดิม ===' : '=== Add to existing avatar ===');
  } else {
    lines.push(lang === 'th' ? 'อวตาร์ตัวใหม่' : 'New Avatar');
  }
  lines.push('');

  if (av) {
    lines.push(`${lang==='th' ? '- เบส' : '- Base:'} ${av.name}`);
  }

  if (state.selections.keepBaseHair === false) {
    lines.push(lang==='th' ? '- ไม่เก็บผมตัวเบส' : '- Remove base hair');
  } else if (state.selections.baseHairChanged) {
    if (state.selections.baseHairColors && state.selections.baseHairColors.length > 0) {
      var bhStr = state.selections.baseHairColors.map(function(c){return c.toUpperCase()}).join(', ');
      var bhToggle = state.selections.baseHairColors.length > 1 ? (lang==='th'?' (สลับสี)':' (toggle)') : '';
      var bhLabel = state.selections.isNewAvatar === false ? (lang==='th' ? '- เปลี่ยนสีผมตัวเบส' : '- Change base hair color:') : (lang==='th' ? '- สีผมตัวเบส' : '- Base hair color:');
      lines.push(bhLabel + ' ' + bhStr + bhToggle);
    }
  } else if (state.selections.isNewAvatar !== false) {
    // New avatar with base hair unchanged
    lines.push((lang==='th' ? '- สีผมตัวเบส' : '- Base hair color:') + ' ' + (lang==='th' ? 'ตามรูปปก' : 'As thumbnail'));
  }
  if (state.selections.keepBaseOutfit === false) {
    lines.push(lang==='th' ? '- ไม่เก็บชุดตัวเบส' : '- Remove base outfit');
  }
  var eyeChanged2 = state.selections.eyeChanged === true;
  if (!eyeChanged2 && state.selections.isNewAvatar !== false) {
    lines.push((lang==='th' ? '- สีตา' : '- Eye color:') + ' ' + (lang==='th' ? 'ตามรูปปก' : 'As thumbnail'));
  } else if (eyeChanged2) {
    var eyeL = state.selections.eyeColorLeft || '#000000';
    var eyeR = state.selections.eyeColorRight || '#000000';
    if (eyeL !== '#000000' || eyeR !== '#000000') {
      var chgPrefix = (state.selections.isNewAvatar === false) ? (lang==='th' ? 'เปลี่ยน' : 'Change ') : '';
      if (eyeL === eyeR) {
        lines.push(chgPrefix + (lang==='th' ? '- สีตา' : '- Eye color:') + ' ' + eyeL.toUpperCase());
      } else {
        lines.push(chgPrefix + (lang==='th' ? '- สีตาซ้าย' : '- Left eye:') + ' ' + eyeL.toUpperCase());
        lines.push(chgPrefix + (lang==='th' ? '- สีตาขวา' : '- Right eye:') + ' ' + eyeR.toUpperCase());
      }
    }
  }

  for (const tex of state.selections.textures) {
    var texLine = (lang==='th' ? '- Texture:' : '- Texture:') + ' ' + tex.name;
    if (tex.note) texLine += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + tex.note + ']';
    lines.push(texLine);
  }

  for (const hair of state.selections.hairs) {
    var hairLine = (lang==='th' ? '- ทรงผม' : '- Hair:') + ' ' + hair.name;
    if (state.selections.isNewAvatar === false && !hair.hairChanged) {
      hairLine += ' ' + (lang==='th' ? 'สีเหมือนทรงผมเก่า' : 'existing color');
    } else if (hair.colors && hair.colors.length > 0) {
      var colorStr = hair.colors.map(function(c) { return c.toUpperCase(); }).join(', ');
      var isMulti = hair.colors.length > 1;
      hairLine += ' ' + (lang==='th' ? 'สี' : 'color:') + ' ' + colorStr;
      if (isMulti) hairLine += (lang==='th' ? ' (สลับสี)' : ' (toggle)');
    }
    if (hair.note) hairLine += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + hair.note + ']';
    lines.push(hairLine);
  }

  for (const cloth of state.selections.clothes) {
    var cline = (lang==='th' ? '- ชุด' : '- Outfit:') + ' ' + cloth.name;
    if (cloth.toggles && cloth.toggles.length > 0) {
      cline += ' ' + (lang==='th' ? '[ปุ่ม: ' : '[toggle: ') + cloth.toggles.join(', ') + ']';
    }
    if (cloth.note) cline += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + cloth.note + ']';
    lines.push(cline);
  }

  for (const acc of state.selections.accessories) {
    var aline = (lang==='th' ? '- เครื่องประดับ' : '- Accessory:') + ' ' + acc.name;
    if (acc.note) aline += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + acc.note + ']';
    lines.push(aline);
  }


  // Optional services
  if (state.selections.optPolygon) lines.push((lang==='th' ? '- ลด Polygon' : '- Reduce polygons'));
  if (state.selections.optPCSS) lines.push((lang==='th' ? '- เพิ่ม PCSS' : '- Add PCSS shadows'));
  var dpsH = state.selections.optDPSHole || 0;
  var dpsR = state.selections.optDPSRod || 0;
  if (dpsH > 0) lines.push((lang==='th' ? '- DPS รู' : '- DPS holes') + ' x' + dpsH);
  if (dpsR > 0) lines.push((lang==='th' ? '- DPS แท่ง' : '- DPS rods') + ' x' + dpsR);

  // Add price
  var price = calculatePrice();
  lines.push('');
  lines.push('---');
  lines.push((lang==='th' ? 'รวมราคา' : 'Total') + ': ' + price.total + ' ' + (lang==='th' ? 'บาท' : 'baht'));
  lines.push('');
  lines.push((lang==='th' ? '※ ราคานี้เป็นราคาประเมินอัตโนมัติ ร้านจะแจ้งยอดยืนยันอีกครั้ง' : '* Auto-estimated price. Shop will confirm final amount.'));

  return lines.join('\n');
}

function copySummary() {
  const text = document.getElementById('summaryText')?.textContent || generateSummaryText();
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = t('copied');
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  });
}

function resetAll() {
  state = {
    page: 'landing',
    selectedAvatar: null,
    selectedClothFirst: null,
    selections: { hairs: [], textures: [], clothes: [], accessories: [], eyeColorLeft: '#000000', eyeColorRight: '#000000', baseHairColors: ['#000000'], keepBaseHair: true, keepBaseOutfit: true, isNewAvatar: true, optPolygon: false, optPCSS: false, optDPSHole: 0, optDPSRod: 0, baseHairChanged: false, eyeChanged: false },
    tagFilter: new Set(),
    tagSearch: '',
  };
  render();
}

// --- Global Error Handler ---
window.onerror = function(msg, url, line, col, error) {
  var app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div style="padding:20px;color:red;background:#1a1a24"><h3>JavaScript Error</h3>' +
      '<p><strong>Message:</strong> ' + msg + '</p>' +
      '<p><strong>Line:</strong> ' + line + ', Column: ' + col + '</p>' +
      '<pre style="font-size:11px;white-space:pre-wrap">' + (error && error.stack ? error.stack : 'no stack') + '</pre></div>';
  }
  return true;
};

// --- Init ---
render();
</script>
</body>
</html>
