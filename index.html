// --- Tag Filter ---
function buildTagIndex(tab) {
  // Collect all items for this tab and count tag frequencies.
  // When tags are already selected, counts reflect the currently filtered set
  // (i.e. "how many items would match if I also add this tag?").
  // Tags that exist in the full set but have 0 in the filtered set are still
  // included so they appear during search.
  var items = [];
  switch (tab) {
    case 'hairs': items = AVATAR_DATA.hairs || []; break;
    case 'textures':
      if (state.selectedAvatar) {
        items = (avatarById(state.selectedAvatar)?.textures || []).slice();
        var setsTex = avatarById('Sets')?.textures || [];
        for (var ti = 0; ti < setsTex.length; ti++) {
          var st = setsTex[ti];
          var compat = st.compatibleAvatars || [];
          if (compat.length > 0 && compat.indexOf(state.selectedAvatar) >= 0) items.push(st);
        }
      }
      break;
    case 'clothes':
      if (state.selectedAvatar) items = clothesForAvatar(state.selectedAvatar);
      break;
    case 'accessories':
      items = (AVATAR_DATA.accessories || []).slice();
      if (state.selectedAvatar) {
        var avId2 = state.selectedAvatar;
        items = items.filter(function(acc) {
          var compat = acc.compatibleAvatars;
          if (!compat || compat.length === 0) return true;
          return compat.indexOf(avId2) >= 0;
        });
      }
      break;
    case 'pathB':
      var setsB = avatarById('Sets');
      if (setsB) items = setsB.clothes || [];
      break;
  }

  // Build full tag frequency from ALL items (unfiltered)
  var fullFreq = {};
  for (var i = 0; i < items.length; i++) {
    var tags = items[i].autoTags || [];
    for (var j = 0; j < tags.length; j++) {
      var t = tags[j];
      fullFreq[t] = (fullFreq[t] || 0) + 1;
    }
  }

  // Apply current tag filter to get refinement counts
  var tagArr = [];
  _tf(tab).forEach(function(t) { tagArr.push(t); });
  var filtered = items;
  if (tagArr.length > 0) {
    filtered = items.filter(function(i) {
      var tags = i.autoTags || [];
      return tagArr.every(function(t) { return tags.indexOf(t) >= 0; });
    });
  }

  var freq = {};
  for (var i2 = 0; i2 < filtered.length; i2++) {
    var ftags = filtered[i2].autoTags || [];
    for (var j2 = 0; j2 < ftags.length; j2++) {
      var t2 = ftags[j2];
      freq[t2] = (freq[t2] || 0) + 1;
    }
  }

  // Build result: include all tags, even if count is 0 or 1.
  // Rare tags still show up during search.
  var result = [];
  var keys = Object.keys(fullFreq);
  for (var k = 0; k < keys.length; k++) {
    var tag = keys[k];
    var count = freq[tag] || 0;
    result.push({tag: tag, count: count, fullCount: fullFreq[tag]});
  }
  result.sort(function(a,b) { return b.count - a.count || b.fullCount - a.fullCount; });
  return result;
}

function renderTagFilter(optTab, refreshFn) {
  var area = (currentMain || document).querySelector('#tagFilterArea');
  if (!area) return;

  var tab = optTab || customTab;
  var refresh = refreshFn || renderCustomTabList;
  var tagData = buildTagIndex(tab);
  var selected = _tf(tab);
  var search = _ts(tab).toLowerCase();

  // Store context on area so event handlers can read current values
  // (avoids stale closure captures when tabs are switched)
  area._tab = tab;
  area._refresh = refresh;

  // Search row — only rebuild if it doesn't exist yet
  var searchRow = area.querySelector('.tag-search-row');
  if (!searchRow) {
    area.innerHTML = '';
    searchRow = document.createElement('div');
    searchRow.className = 'tag-search-row';
    searchRow.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'tag-search';
    input.placeholder = t('tagSearchPlaceholder');
    input.oninput = function() {
      state.tagSearches[area._tab] = this.value;
      renderTagFilter(area._tab, area._refresh);
    };
    searchRow.appendChild(input);

    var clearBtn = document.createElement('button');
    clearBtn.className = 'tag-clear-btn';
    clearBtn.style.display = 'none';
    clearBtn.onclick = function() {
      state.tagFilters[area._tab] = new Set();
      state.tagSearches[area._tab] = '';
      area._refresh();
    };
    searchRow.appendChild(clearBtn);
    area.appendChild(searchRow);

    var chipsArea = document.createElement('div');
    chipsArea.className = 'tag-chips-area';
    area.appendChild(chipsArea);
  }

  // Update search input value
  var input = searchRow.querySelector('.tag-search');
  if (input) input.value = _ts(tab) || '';

  // Update clear button
  var clearBtn = searchRow.querySelector('.tag-clear-btn');
  if (clearBtn) {
    clearBtn.style.display = selected.size > 0 ? '' : 'none';
    if (selected.size > 0) clearBtn.textContent = t('clearTags') + ' (' + selected.size + ')';
  }

  // Rebuild chips only
  var chipsArea = area.querySelector('.tag-chips-area');
  if (!chipsArea) return;
  chipsArea.innerHTML = '';

  // Filter by search — when searching, show all tags including rare ones (count 1)
  // When not searching, only show tags with fullCount >= 2 to keep the default view tidy
  var filtered = tagData;
  if (search) {
    filtered = tagData.filter(function(td) { return td.tag.toLowerCase().indexOf(search) >= 0; });
  } else {
    filtered = tagData.filter(function(td) { return td.fullCount >= 2; });
  }

  var maxShow = search ? filtered.length : Math.min(filtered.length, 40);
  var display = filtered.slice(0, maxShow);

  // Always show selected tags even if they don't match the search
  if (selected.size > 0) {
    var displaySet = new Set();
    for (var d = 0; d < display.length; d++) { displaySet.add(display[d].tag); }
    selected.forEach(function(t) {
      if (!displaySet.has(t)) {
        // Look up the tag count from tagData
        for (var j = 0; j < tagData.length; j++) {
          if (tagData[j].tag === t) { display.unshift(tagData[j]); break; }
        }
      }
    });
  }

  if (display.length === 0) {
    var noMatch = document.createElement('div');
    noMatch.className = 'tag-no-match';
    noMatch.textContent = t('noTagMatch');
    chipsArea.appendChild(noMatch);
    return;
  }

  var chips = document.createElement('div');
  chips.className = 'tag-chips';

  // Put selected tags first
  var ordered = [];
  var rest = [];
  for (var d = 0; d < display.length; d++) {
    if (selected.has(display[d].tag)) ordered.push(display[d]);
    else rest.push(display[d]);
  }
  display = ordered.concat(rest);

  for (var i = 0; i < display.length; i++) {
    var td = display[i];
    var isZero = td.count === 0 && !selected.has(td.tag);
    var chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'tag-chip' + (selected.has(td.tag) ? ' selected' : '') + (isZero ? ' zero' : '');
    chip.appendChild(document.createTextNode(td.tag.replace(/_/g, ' ')));
    var count = document.createElement('span');
    count.className = 'tag-count';
    count.textContent = td.count;
    chip.appendChild(count);
    chip.disabled = isZero;
    if (!isZero) {
      chip.onclick = (function(tag) {
        return function() {
          var tf = _tf(area._tab);
          if (tf.has(tag)) {
            tf.delete(tag);
          } else {
            tf.add(tag);
          }
          refresh();
        };
      })(td.tag);
    }
    chips.appendChild(chip);
  }
  chipsArea.appendChild(chips);
}

    var stalePill = bar.querySelector('#hairSearchPill');
    if (staleButton) staleButton.remove();
    if (stalePill) stalePill.remove();
  }

  const searchEl = (currentMain || document).querySelector('#customSearch');
  const query = searchEl ? searchEl.value.toLowerCase() : '';

  let items = [];
  const sel = state.selections;

  switch (customTab) {
    case 'hairs':
      items = [...AVATAR_DATA.hairs];
      break;
    case 'textures':
      if (state.selectedAvatar) {
        items = (avatarById(state.selectedAvatar)?.textures || []).slice();
        // Include Sets textures compatible with selected avatar (or unknown compat)
        const setsTex = avatarById('Sets')?.textures || [];
        const avId = state.selectedAvatar;
        for (var ti = 0; ti < setsTex.length; ti++) {
          var st = setsTex[ti];
          var compat = st.compatibleAvatars || [];
          if (compat.length > 0 && compat.indexOf(avId) >= 0) {
            items.push(st);
          }
        }
      }
      break;
    case 'clothes':
      if (state.selectedAvatar) {
        items = clothesForAvatar(state.selectedAvatar);
      }
      break;
    case 'accessories':
      items = AVATAR_DATA.accessories.slice();
      // Filter: only show universal (no compat) or compatible with selected avatar
      if (state.selectedAvatar) {
        var avId2 = state.selectedAvatar;
        items = items.filter(function(acc) {
          var compat = acc.compatibleAvatars;
          if (!compat || compat.length === 0) return true; // universal
          return compat.indexOf(avId2) >= 0;
        });
      }
      break;
  }

  // Mark selected
  const selSet = new Set(sel[customTab].map(s => s.name));
  for (const item of items) {
    item._selected = selSet.has(item.name);
  }

  // Filter
  if (query) {
    items = items.filter(i => i.name.toLowerCase().includes(query));
  }

  // Hide unknown compatibility items when checkbox is checked
  var hiddenUnknownCount = 0;
  if (hideUnknownCompat) {
    var _beforeUnknown = items.length;
    items = items.filter(function(i) {
      var compat = i.compatibleAvatars;
      // Items without compat field (hairs, avatar textures) always pass
      // Items with empty compat (unknown) are hidden
      return compat === undefined || compat.length > 0;
    });
    hiddenUnknownCount = _beforeUnknown - items.length;
  }

  // Tag filter (AND logic: item must have ALL selected tags)
  var ctFilter = _tf(customTab);
  if (ctFilter.size > 0) {
    var selectedTags = Array.from(ctFilter);
    items = items.filter(function(i) {
      var tags = i.autoTags || [];
      return selectedTags.every(function(t) { return tags.indexOf(t) >= 0; });
    });
  }

  // Sort
  if (customTab === 'hairs' && hairSearchState.active && hairSearchState.order) {
    var ord = hairSearchState.order;
    items.sort(function(a, b) {
      var ra = ord.has(basenameOf(a.preview)) ? ord.get(basenameOf(a.preview)) : 1e9;
      var rb = ord.has(basenameOf(b.preview)) ? ord.get(basenameOf(b.preview)) : 1e9;
      return ra - rb;
    });
  } else if (customSort === 'alpha') {
    items.sort(function(a,b) { return a.name.localeCompare(b.name); });
  } else {
    items.sort(function(a,b) { return (b.dateAdded || 0) - (a.dateAdded || 0); });
  }

  // Unknown compat badge
  for (const item of items) {
    const badges = [];
    if (customTab === 'clothes' && item.compatibleAvatars && item.compatibleAvatars.length === 0) {
      badges.push({text: t('unknownCompat'), cls: 'badge-unknown'});
    }

    const card = renderCard(item, (clicked) => {
      toggleSelection(customTab, clicked);
      renderCustomTabList();
    }, badges);

    grid.appendChild(card);
  }

  if (items.length === 0) {
    renderEmptyState(grid, !!(query || ctFilter.size), function() {
      var se = (currentMain || document).querySelector('#customSearch');
      if (se) se.value = '';
      _tf(customTab).clear();
      state.tagSearches[customTab] = '';
      renderCustomTabList();
    });
  }

  // Reveal pill: show how many items the unknown-compat filter hid
  var cntEl = document.getElementById('hideUnknownCount');
  if (cntEl) cntEl.textContent = hiddenUnknownCount > 0 ? '(' + hiddenUnknownCount + ')' : '';
  if (hiddenUnknownCount > 0) {
    var pill = document.createElement('button');
    pill.type = 'button';
    pill.className = 'unknown-pill';
    pill.textContent = t('showUnverified').replace('{n}', hiddenUnknownCount);
    pill.onclick = function() {
      hideUnknownCompat = false;
      var cb = document.getElementById('hideUnknown');
      if (cb) cb.checked = false;
      renderCustomTabList();
    };
    grid.appendChild(pill);
  }

  renderSelectedStrip();
  renderColorBar();

  window.scrollTo(0, scrollY);
}

function colorName(hex) {
  var names = {
    '#000000': lang==='th'?'ดำ':'Black', '#ffffff': lang==='th'?'ขาว':'White',
    '#ff0000': lang==='th'?'แดง':'Red', '#ffcccc': lang==='th'?'ชมพูอ่อน':'Light Pink',
    '#ff69b4': lang==='th'?'ชมพู':'Pink', '#ff1493': lang==='th'?'ชมพูเข้ม':'Deep Pink',
    '#ff8800': lang==='th'?'ส้ม':'Orange', '#ffff00': lang==='th'?'เหลือง':'Yellow',
    '#00ff00': lang==='th'?'เขียว':'Green', '#0000ff': lang==='th'?'น้ำเงิน':'Blue',
    '#00ffff': lang==='th'?'ฟ้า':'Cyan', '#800080': lang==='th'?'ม่วง':'Purple',
    '#8b4513': lang==='th'?'น้ำตาล':'Brown', '#808080': lang==='th'?'เทา':'Gray',
    '#cccccc': lang==='th'?'เทาอ่อน':'Light Gray', '#ffd700': lang==='th'?'ทอง':'Gold',
    '#c0c0c0': lang==='th'?'เงิน':'Silver', '#ffb6c1': lang==='th'?'ชมพูอ่อน':'Light Pink',
    '#90ee90': lang==='th'?'เขียวอ่อน':'Light Green', '#87ceeb': lang==='th'?'ฟ้าอ่อน':'Light Blue',
    '#f5f5dc': lang==='th'?'เบจ':'Beige', '#ffe4c4': lang==='th'?'ไบออเรจ':'Bisque',
    '#d2b48c': lang==='th'?'แทน':'Tan', '#a52a2a': lang==='th'?'น้ำตาลแดง':'Brown',
    '#800000': lang==='th'?'แดงเข้ม':'Maroon', '#008000': lang==='th'?'เขียวเข้ม':'Dark Green',
    '#000080': lang==='th'?'กรมท่า':'Navy', '#4b0082': lang==='th'?'คราม':'Indigo',
  };
  hex = hex.toLowerCase();
  if (names[hex]) return names[hex];
  // Try closest match
  var closest = null, minDist = Infinity;
  for (var h in names) {
    var d = Math.abs(parseInt(h.slice(1,3),16) - parseInt(hex.slice(1,3),16)) +
            Math.abs(parseInt(h.slice(3,5),16) - parseInt(hex.slice(3,5),16)) +
            Math.abs(parseInt(h.slice(5,7),16) - parseInt(hex.slice(5,7),16));
    if (d < minDist) { minDist = d; closest = names[h]; }
  }
  return closest || hex;
}

function toggleSelection(tab, item) {
  const sel = state.selections[tab];
  const idx = sel.findIndex(s => s.name === item.name);
  if (idx >= 0) {
    sel.splice(idx, 1);
    item._selected = false;
  } else {
    var entry = { name: item.name, preview: item.preview, sourceFile: item.sourceFile };
    if (tab === 'hairs') {
      if (state.selections.isNewAvatar === false) {
        entry.colors = []; // empty = existing color
        entry.hairChanged = false;
      } else {
        entry.colors = ['#000000'];
      }
    }
    sel.push(entry);
    item._selected = true;
  }
}

function _loadImg(src) {
  return new Promise(function(resolve) {
    var im = new Image();
    im.onload = function() { resolve(im); };
    im.onerror = function() { resolve(null); };
    im.src = src;
  });
}

async function buildOrderImage() {
  await (document.fonts ? document.fonts.ready : Promise.resolve());
  const av = avatarById(state.selectedAvatar);
  const sel = state.selections;
  const sections = [
    { label: t('hair'),        items: sel.hairs },
    { label: t('textures'),    items: sel.textures },
    { label: t('outfit'),      items: sel.clothes },
    { label: t('accessories'), items: sel.accessories },
  ].filter(function(s){ return s.items && s.items.length; });

  const allItems = [];
  if (av) allItems.push(av);
  sections.forEach(function(s){ s.items.forEach(function(it){ allItems.push(it); }); });
  const imgMap = {};
  await Promise.all(allItems.map(function(it) {
    if (!it.preview) { imgMap[it.name] = null; return Promise.resolve(); }
    return _loadImg(imgSrc(it.preview)).then(function(im){ imgMap[it.name] = im; });
  }));

  const DPR = Math.max(2, window.devicePixelRatio || 1);
  const W = 900, PAD = 28, THUMB = 150, LABEL_H = 26, COL_GAP = 16, ROW_GAP = 10;
  const perRow = Math.floor((W - PAD * 2 + COL_GAP) / (THUMB + COL_GAP));
  const FONT = "'Manrope','Noto Sans Thai',system-ui,sans-serif";

  let h = PAD + 88 + 18;
  sections.forEach(function(s) {
    const rows = Math.ceil(s.items.length / perRow);
    h += 34 + rows * (THUMB + LABEL_H + ROW_GAP);
  });
  h += PAD;

  const canvas = document.createElement('canvas');
  canvas.width = W * DPR; canvas.height = Math.ceil(h) * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  ctx.textBaseline = 'top';

  ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, W, h);

  function roundRect(x, y, w, hh, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + hh, r);
    ctx.arcTo(x + w, y + hh, x, y + hh, r);
    ctx.arcTo(x, y + hh, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function drawThumb(im, name, x, y) {
    roundRect(x, y, THUMB, THUMB, 12); ctx.save(); ctx.clip();
    if (im) { ctx.drawImage(im, x, y, THUMB, THUMB); }
    else { ctx.fillStyle = '#111111'; ctx.fillRect(x, y, THUMB, THUMB); }
    ctx.restore();
    ctx.fillStyle = '#a8a098'; ctx.font = '13px ' + FONT;
    let nm = name; if (ctx.measureText(nm).width > THUMB) { while (nm.length > 4 && ctx.measureText(nm + '…').width > THUMB) nm = nm.slice(0, -1); nm += '…'; }
    ctx.fillText(nm, x, y + THUMB + 6);
  }

  let y = PAD;
  roundRect(PAD, y, W - PAD * 2, 88, 8); ctx.fillStyle = '#111111'; ctx.fill();
  if (av && imgMap[av.name]) { roundRect(PAD + 12, y + 12, 64, 64, 10); ctx.save(); ctx.clip(); ctx.drawImage(imgMap[av.name], PAD + 12, y + 12, 64, 64); ctx.restore(); }
  ctx.fillStyle = '#f3eee7'; ctx.font = '700 24px ' + FONT;
  ctx.fillText(av ? av.name : '-', PAD + 90, y + 20);
  const pc = (typeof pieceCount === 'function') ? pieceCount() : 0;
  const dateStr = new Date().toISOString().slice(0, 10);
  ctx.fillStyle = '#a8a098'; ctx.font = '15px ' + FONT;
  ctx.fillText(pc + ' ' + t('pieces') + '   ·   ' + dateStr, PAD + 90, y + 52);
  y += 88 + 18;

  sections.forEach(function(s) {
    ctx.fillStyle = '#48dfcc'; ctx.font = '700 16px ' + FONT;
    ctx.fillText(s.label.toUpperCase(), PAD, y); y += 34 - 10;
    let col = 0, rowY = y;
    s.items.forEach(function(it, i) {
      const x = PAD + col * (THUMB + COL_GAP);
      drawThumb(imgMap[it.name], it.name, x, rowY);
      col++;
      if (col >= perRow) { col = 0; rowY += THUMB + LABEL_H + ROW_GAP; }
    });
    y = rowY + (col > 0 ? (THUMB + LABEL_H + ROW_GAP) : 0);
  });

  return canvas;
}

async function showOrderImage() {
  var btn = document.getElementById('mkImgBtn');
  var area = document.getElementById('orderImageArea');
  if (!area) return;
  var old = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = t('generatingImage'); }
  try {
    var canvas = await buildOrderImage();
    window._orderCanvas = canvas;
    area.innerHTML = '';
    var img = document.createElement('img');
    img.src = canvas.toDataURL('image/png');
    img.style.cssText = 'max-width:100%;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)';
    area.appendChild(img);
    var row = document.createElement('div');
    row.style.cssText = 'margin-top:10px;display:flex;gap:8px;flex-wrap:wrap';
    row.id = 'orderImageActions';
    area.appendChild(row);
    if (typeof wireOrderImageActions === 'function') wireOrderImageActions(row);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = old; }
  }
}

function _canCopyImage() {
  return !!(window.ClipboardItem && navigator.clipboard && navigator.clipboard.write);
}
function wireOrderImageActions(row) {
  row.innerHTML = '';
  if (_canCopyImage()) {
    var cp = document.createElement('button');
    cp.className = 'btn-success'; cp.textContent = t('copyImage');
    cp.onclick = copyOrderImage;
    row.appendChild(cp);
  }
  var dl = document.createElement('button');
  dl.className = 'btn-secondary'; dl.textContent = t('downloadImage');
  dl.onclick = downloadOrderImage;
  row.appendChild(dl);
  if (!_canCopyImage()) {
    var hint = document.createElement('span');
    hint.style.cssText = 'font-size:.8rem;color:var(--text2);align-self:center';
    hint.textContent = t('copyImageUnsupported');
    row.appendChild(hint);
  }
}
function _orderFilename() {
  var av = avatarById(state.selectedAvatar);
  var nm = (av ? av.name : 'order').replace(/[^a-zA-Z0-9_-]/g, '');
  return 'order-' + (nm || 'avatar') + '-' + new Date().toISOString().slice(0, 10) + '.png';
}
function copyOrderImage() {
  if (!window._orderCanvas) return;
  window._orderCanvas.toBlob(function(blob) {
    if (!blob || !_canCopyImage()) { downloadOrderImage(); return; }
    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
      .then(function() { showToast(t('imageCopied')); })
      .catch(function() { showToast(t('copyImageUnsupported')); downloadOrderImage(); });
  }, 'image/png');
}
function downloadOrderImage() {
  if (!window._orderCanvas) return;
  window._orderCanvas.toBlob(function(blob) {
    if (!blob) return;
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = _orderFilename();
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }, 'image/png');
}

function renderSummary(main) {
  currentMain = main;
  const av = avatarById(state.selectedAvatar);

  main.innerHTML = `
    <div class="page-eyebrow">${lang==='th' ? 'สรุปคำสั่งซื้อ' : 'Order summary'}</div>
    <div class="page-title">${t('summaryTitle')}</div>
    <div id="summaryContent"></div>
    <div class="copy-both-note">${t('copyBothNote')}</div>
    <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-secondary" onclick="state.page='customize';render()">${t('back')}</button>
      <button class="btn-success copy-btn" onclick="copySummary()">${t('copyText')}</button>
      <button class="btn-primary" id="mkImgBtn" onclick="showOrderImage()">${t('createImage')}</button>
      <button class="btn-danger" onclick="resetAll()">${t('startOver')}</button>
    </div>
    <div id="orderImageArea" style="margin-top:16px"></div>
  `;

  const content = main.querySelector('#summaryContent');

  // Visual cards
  const sections = [
    { key: 'avatar', label: t('avatar'), items: av ? [{name: av.name, preview: av.preview, _isAvatar: true}] : [] },
    { key: 'hairs', label: t('hair'), items: state.selections.hairs },
    { key: 'textures', label: t('textures'), items: state.selections.textures },
    { key: 'clothes', label: t('outfit'), items: state.selections.clothes },
    { key: 'accessories', label: t('accessories'), items: state.selections.accessories },
  ];

  for (const sec of sections) {
    if (sec.items.length === 0) continue;

    const div = document.createElement('div');
    div.className = 'summary-section';
    div.innerHTML = `<h3>${sec.label} (${sec.items.length})</h3>`;

    const grid = document.createElement('div');
    grid.className = 'summary-grid';
    for (const item of sec.items) {
      const card = renderCard(item, null, []);
      grid.appendChild(card);
    }
    div.appendChild(grid);
    content.appendChild(div);
  }

  // Text summary
  const textDiv = document.createElement('div');
  textDiv.className = 'summary-section';
  var briefTitle = state.selections.isNewAvatar === false ? (lang==='th' ? 'เพิ่มของใส่ตัวเดิม' : 'Add to Existing') : (lang==='th' ? 'อวตาร์ตัวใหม่' : 'New Avatar');
  textDiv.innerHTML = '<h3>' + briefTitle + '</h3>';
  const textPre = document.createElement('div');
  textPre.className = 'summary-text';
  textPre.id = 'summaryText';
  textPre.textContent = generateSummaryText();
  textDiv.appendChild(textPre);
  content.appendChild(textDiv);

  // Price breakdown
  var priceDiv = document.createElement('div');
  priceDiv.className = 'summary-section';
  priceDiv.innerHTML = '<h3>' + (lang==='th' ? 'สรุปราคา' : 'Price Summary') + '</h3>';
  var price = calculatePrice();
  var priceList = document.createElement('div');
  priceList.style.cssText = 'background:var(--surface);border-radius:var(--radius);padding:12px 16px;font-size:.85rem;line-height:2';
  var priceHTML = '';
  for (var pi = 0; pi < price.details.length; pi++) {
    var parts = price.details[pi].split(': ');
    var label = parts[0];
    var amount = parts[1] || '';
    priceHTML += '<div style="display:flex;justify-content:space-between"><span>' + label + '</span><span>' + amount + ' <span style="color:var(--text2)">บาท</span></span></div>';
  }
  priceHTML += '<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:1rem;color:var(--accent)"><span>' + (lang==='th' ? 'รวม' : 'Total') + '</span><span>' + price.total + ' บาท</span></div>';
  priceList.innerHTML = priceHTML;
  priceDiv.appendChild(priceList);
  content.appendChild(priceDiv);
}

function calculatePrice() {
  var total = 0;
  var details = [];
  var isNew = state.selections.isNewAvatar !== false;

  // Base avatar (only for new avatars)
  if (isNew) {
    total += PRICING.baseAvatar;
    details.push((lang==='th'?'ตัวเบส':'Base avatar') + ': ' + PRICING.baseAvatar);
  } else {
    details.push((lang==='th'?'เพิ่มของใส่ตัวเดิม (ไม่มีค่าตัวเบส)':'Add to existing avatar (no base cost)') + ': 0');
  }
  // Hair
  if (state.selections.hairs.length > 0) {
    var hc = state.selections.hairs.length * PRICING.hair;
    total += hc;
    details.push((lang==='th'?'ทรงผม':'Hair') + ' x' + state.selections.hairs.length + ': ' + hc);
  }
  // Hair color changes and toggle colors
  var hairToggleCount = 0;
  if (isNew) {
    // New avatar: only count extra colors beyond first
    if (state.selections.baseHairColors && state.selections.baseHairColors.length > 1) {
      hairToggleCount += state.selections.baseHairColors.length - 1;
    }
    for (var hi = 0; hi < state.selections.hairs.length; hi++) {
      var hcolors = state.selections.hairs[hi].colors || [];
      if (hcolors.length > 1) hairToggleCount += hcolors.length - 1;
    }
  } else {
    // Existing avatar: first color change costs 9, extras cost 9 each
    if (state.selections.baseHairChanged) {
      hairToggleCount += 1;
      if (state.selections.baseHairColors && state.selections.baseHairColors.length > 1) {
        hairToggleCount += state.selections.baseHairColors.length - 1;
      }
    }
    for (var hi = 0; hi < state.selections.hairs.length; hi++) {
      var hcolors2 = state.selections.hairs[hi].colors || [];
      if (hcolors2.length > 0) {
        hairToggleCount += 1; // changing from existing
        if (hcolors2.length > 1) hairToggleCount += hcolors2.length - 1;
      }
    }
  }
  if (hairToggleCount > 0) {
    var htc = hairToggleCount * PRICING.hairColorChange;
    total += htc;
    details.push((lang==='th'?'ค่าปรับสีผม':'Hair color change') + ' x' + hairToggleCount + ': ' + htc);
  }
  // Eye color: free for new avatar, priced for existing (unless they added textures)
  var eyeChanged = state.selections.eyeChanged === true;
  if (!isNew && eyeChanged && state.selections.textures.length === 0) {
    total += PRICING.eyeColorChange;
    details.push((lang==='th'?'ค่าปรับสีตา':'Eye color change') + ': ' + PRICING.eyeColorChange);
  } else if (!isNew && eyeChanged && state.selections.textures.length > 0) {
    details.push((lang==='th'?'ปรับสีตา (ฟรี เพราะเพิ่ม Texture)':'Eye color change (free with texture)') + ': 0');
  }
  // Textures
  if (state.selections.textures.length > 0) {
    var tc = state.selections.textures.length * PRICING.texture;
    total += tc;
    details.push((lang==='th'?'Texture':'Texture') + ' x' + state.selections.textures.length + ': ' + tc);
  }
  // Clothes
  if (state.selections.clothes.length > 0) {
    var cc = state.selections.clothes.length * PRICING.cloth;
    total += cc;
    details.push((lang==='th'?'ชุด':'Outfit') + ' x' + state.selections.clothes.length + ': ' + cc);
  }
  // Cloth toggles: priced each, free for head items
  var headKeywords = ['หมวก','hat','cap','hood','หูฟัง','headphone','earphone','หูแมว','หูกระต่าย','cat ear','bunny ear','rabbit ear','animal ear','helmet','crown','มงกุฎ','headband','ribbon','โบว์','bow','glasses','แว่น','mask','หน้ากาก','veil','hoodie','หู','ears','head','หัว','bean','beanie','beret','visor','tiara','hairpin','hairclip','กิ๊บ','clip'];
  var paidToggles = 0;
  var freeToggles = 0;
  for (var ci = 0; ci < state.selections.clothes.length; ci++) {
    var ctogs = state.selections.clothes[ci].toggles || [];
    for (var ti = 0; ti < ctogs.length; ti++) {
      var tname = ctogs[ti].toLowerCase();
      var isHead = false;
      for (var hk = 0; hk < headKeywords.length; hk++) {
        if (tname.indexOf(headKeywords[hk]) >= 0) { isHead = true; break; }
      }
      if (isHead) freeToggles++; else paidToggles++;
    }
  }
  if (paidToggles > 0) {
    total += paidToggles * PRICING.clothToggle;
    details.push((lang==='th'?'ปุ่มเปิดปิดชุด':'Outfit toggles') + ' x' + paidToggles + ': ' + (paidToggles * PRICING.clothToggle));
  }
  if (freeToggles > 0) {
    details.push((lang==='th'?'ปุ่มเปิดปิดของบนหัว (ฟรี)':'Head item toggles (free)') + ' x' + freeToggles + ': 0');
  }
  // Accessories (free toggles)
  if (state.selections.accessories.length > 0) {
    var ac = state.selections.accessories.length * PRICING.accessory;
    total += ac;
    details.push((lang==='th'?'เครื่องประดับ':'Accessories') + ' x' + state.selections.accessories.length + ': ' + ac);
  }
  // Optional services
  if (state.selections.optPolygon) {
    total += PRICING.polygonReduction;
    details.push((lang==='th'?'ลด Polygon':'Polygon reduction') + ': ' + PRICING.polygonReduction);
  }
  if (state.selections.optPCSS) {
    total += PRICING.pcssShadows;
    details.push((lang==='th'?'PCSS เงาสมจริง':'PCSS shadows') + ': ' + PRICING.pcssShadows);
  }
  var dpsHole = state.selections.optDPSHole || 0;
  var dpsRod = state.selections.optDPSRod || 0;
  if (dpsHole > 0) {
    total += dpsHole * PRICING.dpsHole;
    details.push((lang==='th'?'DPS รู':'DPS holes') + ' x' + dpsHole + ': ' + (dpsHole * PRICING.dpsHole));
  }
  if (dpsRod > 0) {
    total += dpsRod * PRICING.dpsRod;
    details.push((lang==='th'?'DPS แท่ง':'DPS rods') + ' x' + dpsRod + ': ' + (dpsRod * PRICING.dpsRod));
  }
  return { total: total, details: details };
}

function generateSummaryText() {
  const lines = [];
  const av = avatarById(state.selectedAvatar);

  if (state.selections.isNewAvatar === false) {
    lines.push(lang === 'th' ? '=== เพิ่มของใส่ตัวเดิม ===' : '=== Add to existing avatar ===');
  } else {
    lines.push(lang === 'th' ? 'อวตาร์ตัวใหม่' : 'New Avatar');
  }
  lines.push('');

  if (av) {
    lines.push(`${lang==='th' ? '- เบส' : '- Base:'} ${av.name}`);
  }

  if (state.selections.keepBaseHair === false) {
    lines.push(lang==='th' ? '- ไม่เก็บผมตัวเบส' : '- Remove base hair');
  } else if (state.selections.baseHairChanged) {
    if (state.selections.baseHairColors && state.selections.baseHairColors.length > 0) {
      var bhStr = state.selections.baseHairColors.map(function(c){return c.toUpperCase()}).join(', ');
      var bhToggle = state.selections.baseHairColors.length > 1 ? (lang==='th'?' (สลับสี)':' (toggle)') : '';
      var bhLabel = state.selections.isNewAvatar === false ? (lang==='th' ? '- เปลี่ยนสีผมตัวเบส' : '- Change base hair color:') : (lang==='th' ? '- สีผมตัวเบส' : '- Base hair color:');
      lines.push(bhLabel + ' ' + bhStr + bhToggle);
    }
  } else if (state.selections.isNewAvatar !== false) {
    // New avatar with base hair unchanged
    lines.push((lang==='th' ? '- สีผมตัวเบส' : '- Base hair color:') + ' ' + (lang==='th' ? 'ตามรูปปก' : 'As thumbnail'));
  }
  if (state.selections.keepBaseOutfit === false) {
    lines.push(lang==='th' ? '- ไม่เก็บชุดตัวเบส' : '- Remove base outfit');
  }
  var eyeChanged2 = state.selections.eyeChanged === true;
  if (!eyeChanged2 && state.selections.isNewAvatar !== false) {
    lines.push((lang==='th' ? '- สีตา' : '- Eye color:') + ' ' + (lang==='th' ? 'ตามรูปปก' : 'As thumbnail'));
  } else if (eyeChanged2) {
    var eyeL = state.selections.eyeColorLeft || '#000000';
    var eyeR = state.selections.eyeColorRight || '#000000';
    if (eyeL !== '#000000' || eyeR !== '#000000') {
      var chgPrefix = (state.selections.isNewAvatar === false) ? (lang==='th' ? 'เปลี่ยน' : 'Change ') : '';
      if (eyeL === eyeR) {
        lines.push(chgPrefix + (lang==='th' ? '- สีตา' : '- Eye color:') + ' ' + eyeL.toUpperCase());
      } else {
        lines.push(chgPrefix + (lang==='th' ? '- สีตาซ้าย' : '- Left eye:') + ' ' + eyeL.toUpperCase());
        lines.push(chgPrefix + (lang==='th' ? '- สีตาขวา' : '- Right eye:') + ' ' + eyeR.toUpperCase());
      }
    }
  }

  for (const tex of state.selections.textures) {
    var texLine = (lang==='th' ? '- Texture:' : '- Texture:') + ' ' + tex.name;
    if (tex.note) texLine += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + tex.note + ']';
    lines.push(texLine);
  }

  for (const hair of state.selections.hairs) {
    var hairLine = (lang==='th' ? '- ทรงผม' : '- Hair:') + ' ' + hair.name;
    if (state.selections.isNewAvatar === false && !hair.hairChanged) {
      hairLine += ' ' + (lang==='th' ? 'สีเหมือนทรงผมเก่า' : 'existing color');
    } else if (hair.colors && hair.colors.length > 0) {
      var colorStr = hair.colors.map(function(c) { return c.toUpperCase(); }).join(', ');
      var isMulti = hair.colors.length > 1;
      hairLine += ' ' + (lang==='th' ? 'สี' : 'color:') + ' ' + colorStr;
      if (isMulti) hairLine += (lang==='th' ? ' (สลับสี)' : ' (toggle)');
    }
    if (hair.note) hairLine += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + hair.note + ']';
    lines.push(hairLine);
  }

  for (const cloth of state.selections.clothes) {
    var cline = (lang==='th' ? '- ชุด' : '- Outfit:') + ' ' + cloth.name;
    if (cloth.toggles && cloth.toggles.length > 0) {
      cline += ' ' + (lang==='th' ? '[ปุ่ม: ' : '[toggle: ') + cloth.toggles.join(', ') + ']';
    }
    if (cloth.note) cline += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + cloth.note + ']';
    lines.push(cline);
  }

  for (const acc of state.selections.accessories) {
    var aline = (lang==='th' ? '- เครื่องประดับ' : '- Accessory:') + ' ' + acc.name;
    if (acc.note) aline += ' [' + (lang==='th' ? 'โน้ต' : 'note') + ': ' + acc.note + ']';
    lines.push(aline);
  }


  // Optional services
  if (state.selections.optPolygon) lines.push((lang==='th' ? '- ลด Polygon' : '- Reduce polygons'));
  if (state.selections.optPCSS) lines.push((lang==='th' ? '- เพิ่ม PCSS' : '- Add PCSS shadows'));
  var dpsH = state.selections.optDPSHole || 0;
  var dpsR = state.selections.optDPSRod || 0;
  if (dpsH > 0) lines.push((lang==='th' ? '- DPS รู' : '- DPS holes') + ' x' + dpsH);
  if (dpsR > 0) lines.push((lang==='th' ? '- DPS แท่ง' : '- DPS rods') + ' x' + dpsR);

  // Add price
  var price = calculatePrice();
  lines.push('');
  lines.push('---');
  lines.push((lang==='th' ? 'รวมราคา' : 'Total') + ': ' + price.total + ' ' + (lang==='th' ? 'บาท' : 'baht'));
  lines.push('');
  lines.push((lang==='th' ? '※ ราคานี้เป็นราคาประเมินอัตโนมัติ ร้านจะแจ้งยอดยืนยันอีกครั้ง' : '* Auto-estimated price. Shop will confirm final amount.'));

  return lines.join('\n');
}

function copySummary() {
  const text = document.getElementById('summaryText')?.textContent || generateSummaryText();
  navigator.clipboard.writeText(text).then(() => {
    showToast(t('copied'));

}

function resetAll() {
  if (state.selectedAvatar && !confirm(t('confirmReset'))) return;
  state = {
    page: 'landing',
    selectedAvatar: null,
    selectedClothFirst: null,
    selections: { hairs: [], textures: [], clothes: [], accessories: [], eyeColorLeft: '#000000', eyeColorRight: '#000000', baseHairColors: ['#000000'], keepBaseHair: true, keepBaseOutfit: true, isNewAvatar: true, optPolygon: false, optPCSS: false, optDPSHole: 0, optDPSRod: 0, baseHairChanged: false, eyeChanged: false },
    tagFilters: {},
    tagSearches: {},

}

};
